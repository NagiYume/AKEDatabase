<!-- plugin/item.html -->
<link rel="stylesheet" href="/theme/item.css">

<div class="item-module">
    <div class="left-column">
        <div class="list-search">
            <input type="text" id="itemSearchInput" placeholder="搜索物品 (名称/ID)" class="search-input">
        </div>
        <!-- 筛选栏 -->
        <div class="filter-bar" id="itemFilterBar">
            <div class="filter-section">
                <span class="filter-label">稀有度:</span>
                <div class="filter-buttons" id="itemRarityFilter"></div>
            </div>
            <div class="filter-section">
                <span class="filter-label">分类:</span>
                <div class="filter-buttons" id="itemCategoryFilter"></div>
            </div>
        </div>
        <div class="item-list" id="itemList"></div>
    </div>
    <div class="item-detail" id="itemDetail">
        <div class="loader">加载物品数据...</div>
    </div>
</div>

<script>
    (function() {
        let allItems = [];
        let activeItemId = null;
        let isInitialized = false;
        let searchTerm = '';

        // 筛选状态：稀有度 和 自定义分类
        let selectedRarities = new Set();
        let selectedCategories = new Set();

        const IMAGE_BASE_PATH = '/public/images/';

        // 原始类型映射（用于详情显示）
        const TYPE_MAP = {
            1: '折金票',
            2: '嵌晶玉',
            4: '角色',
            5: '武器',
            6: '装备',
            7: '角色经验',
            8: '材料',
            9: '工业设备',
            10: '核心',
            11: '物流设备',
            12: '蓝图',
            13: '任务道具',
            14: '寻访凭证',
            19: '基质',
            21: '理智',
            22: '消耗品',
            25: '武器经验',
            26: '武器突破',
            27: '角色培养',
            28: '矿点',
            29: '源石',
            32: '测试用道具',
            33: '礼物',
            34: '种植道具',
            37: '行动资历',
            38: '活跃度',
            39: '配方',
            40: '升级材料',
            41: '存放点',
            42: '信物',
            43: '自选箱',
            44: '信用',
            45: '解析晶块',
            47: '装备配方',
            48: '食物',
            49: '终点配额',
            51: '据点发展值',
            52: '食物',
            53: '调度券',
            54: '作战设备',
            55: '探物器',
            56: '货组',
            57: '情报',
            58: '滤镜',
            59: '音乐',
            60: '刻写箱',
            61: '冷却脂',
            62: '理智回复',
            63: '限时理智',
            64: '系统蓝图',
            65: '建设值',
            66: '头像',
            67: '头像框',
            68: '名片主题',
            69: '展品',
            70: '贴纸',
            71: '结核',
            72: '残块',
            73: '残块(已开启)',
            74: '醚质晶块',
            75: '芯片',
            76: '记忆网纸',
            77: '行动刻度',
            78: '刻写券',
            79: '武库配额',
            80: '作战设备容量',
            81: '寻访凭证',
            82: '限时寻访凭证',
            83: '寻访情报书',
            84: '通行证经验',
            85: '通行证申请',
            86: '通行证申请(预设)',
            87: '武器原型',
            88: '精锻助剂',
            89: '月卡凭证',
            90: '月卡凭证',
            91: '地区增益',
            92: '工业点数',
            95: '技能专精',
            96: '存续的痕迹',
            97: '理智萃取器',
            98: '理智消耗许可',
            99: '叙事',
            100: '蚀刻章'
        };

        // ========== 自定义分类配置 ==========
        // 请根据实际需求修改此映射：分类名称 -> 该分类包含的类型ID数组
        const TYPE_MAP_REL = {
            '贵重道具': [1, 2, 21,85,86,79,49,89,90,29,37,84,53,65,78,55,61,62,63,97,98,51,44,38],
            '抽卡道具': [43,42,83,81,82,14],
            '角色相关': [4,42,96,27,95,7,76],
            '武器相关': [87,5,25,26],
            '消耗品': [22,48,52,39,40],
            '个性化': [66,67,68,69,70,76,58],
            '基质': [19,60,78],
            '基建': [10,12,54,92,9,11,64,41,28],
            '装备':[6,88,47],
            '材料':[8,34],
            '物资调度': [33,56],
            '阅读物':[99],
            '谷地像差':[71,72,73,74,77,75],
            '任务道具':[13],
            '蚀刻章':[100],
            '杂项': [32,59,80,57,45,50,91]
        };
        // ====================================

        // 构建反向映射：类型ID -> 分类名称（如果某个ID出现在多个分类中，只取第一个匹配的）
        const typeIdToCategory = {};
        for (const [category, typeIds] of Object.entries(TYPE_MAP_REL)) {
            for (const typeId of typeIds) {
                if (!typeIdToCategory.hasOwnProperty(typeId)) {
                    typeIdToCategory[typeId] = category;
                }
            }
        }

        // 获取物品的分类名称，若未定义则返回 "未分类"
        function getItemCategory(typeId) {
            return typeIdToCategory[typeId] || '未分类';
        }

        function getCurrentShowHidden() {
            return window.akeData?.getConfig().showHidden ?? false;
        }

        function parseText(text) {
            return window.parseText(text, IMAGE_BASE_PATH);
        }

        // 合并搜索和筛选
        function filterItems(items) {
            return items.filter(item => {
                // 搜索过滤
                if (searchTerm) {
                    const term = searchTerm.toLowerCase();
                    const nameMatch = item.name && item.name.toLowerCase().includes(term);
                    const idMatch = item.itemId && item.itemId.toLowerCase().includes(term);
                    if (!nameMatch && !idMatch) return false;
                }
                // 稀有度筛选
                if (selectedRarities.size > 0 && !selectedRarities.has(item.rarity)) return false;
                // 自定义分类筛选
                if (selectedCategories.size > 0) {
                    const category = getItemCategory(item.type);
                    if (!selectedCategories.has(category)) return false;
                }
                return true;
            });
        }

        // 生成筛选按钮
        function generateFilterButtons() {
            const rarityContainer = document.getElementById('itemRarityFilter');
            const categoryContainer = document.getElementById('itemCategoryFilter');
            if (!rarityContainer || !categoryContainer) return;

            // ---- 稀有度按钮 ----
            const existingRarities = new Set(allItems.map(i => i.rarity));
            rarityContainer.innerHTML = '';
            for (let r = 1; r <= 6; r++) {
                if (existingRarities.has(r)) {
                    const btn = document.createElement('span');
                    btn.className = `filter-btn ${selectedRarities.has(r) ? 'active' : ''}`;
                    btn.dataset.rarity = r;
                    btn.textContent = r + '星';
                    btn.addEventListener('click', () => {
                        if (selectedRarities.has(r)) {
                            selectedRarities.delete(r);
                        } else {
                            selectedRarities.add(r);
                        }
                        btn.classList.toggle('active');
                        renderItemList();
                    });
                    rarityContainer.appendChild(btn);
                }
            }

            // ---- 自定义分类按钮 ----
            // 收集所有物品实际存在的分类
            const existingCategories = new Set();
            allItems.forEach(item => {
                const cat = getItemCategory(item.type);
                existingCategories.add(cat);
            });

            // 优先显示配置中的分类顺序，最后显示“未分类”
            const configuredCategories = Object.keys(TYPE_MAP_REL);
            const sortedCategories = configuredCategories.filter(cat => existingCategories.has(cat));
            if (existingCategories.has('未分类')) {
                sortedCategories.push('未分类');
            }

            categoryContainer.innerHTML = '';
            sortedCategories.forEach(category => {
                const btn = document.createElement('span');
                btn.className = `filter-btn ${selectedCategories.has(category) ? 'active' : ''}`;
                btn.dataset.category = category;
                btn.textContent = category;
                btn.addEventListener('click', () => {
                    if (selectedCategories.has(category)) {
                        selectedCategories.delete(category);
                    } else {
                        selectedCategories.add(category);
                    }
                    btn.classList.toggle('active');
                    renderItemList();
                });
                categoryContainer.appendChild(btn);
            });
        }

        async function loadItemManifest(showHidden) {
            try {
                const res = await fetch('/public/CH/item/manifest.json?t=' + Date.now());
                if (!res.ok) throw new Error('无法加载物品清单');
                const all = await res.json();
                let items = showHidden ? all : all.filter(i => !i.hidden);
                items.sort((a, b) => (a.priority || 999) - (b.priority || 999));
                return items;
            } catch (err) {
                console.error('加载物品清单失败:', err);
                return [];
            }
        }

        function renderItemList() {
            const container = document.getElementById('itemList');
            const detailContainer = document.getElementById('itemDetail');
            if (!container) return;

            const filtered = filterItems(allItems);

            container.innerHTML = '';
            if (filtered.length === 0) {
                container.innerHTML = '<div class="loader">无匹配物品</div>';
                if (detailContainer) detailContainer.innerHTML = '<div class="loader">请选择物品</div>';
                activeItemId = null;
                return;
            }

            filtered.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `item-item ${item.itemId === activeItemId ? 'active' : (index === 0 && !activeItemId ? 'active' : '')}`;
                div.dataset.itemId = item.itemId;
                div.dataset.contentFile = item.contentFile;

                const rarityBar = document.createElement('span');
                rarityBar.className = `rarity-bar rarity-${item.rarity}`;
                rarityBar.title = `稀有度 ${item.rarity}`;

                const icon = document.createElement('img');
                icon.className = 'item-icon';
                icon.src = item.icon || '';
                icon.onerror = function() { this.onerror = null; this.src = ''; };

                const infoDiv = document.createElement('div');
                infoDiv.className = 'item-info';

                const nameSpan = document.createElement('div');
                nameSpan.className = 'item-name';
                nameSpan.textContent = item.name;

                const idSpan = document.createElement('div');
                idSpan.className = 'item-id';
                idSpan.textContent = item.itemId;

                infoDiv.appendChild(nameSpan);
                infoDiv.appendChild(idSpan);

                div.appendChild(rarityBar);
                div.appendChild(icon);
                div.appendChild(infoDiv);

                div.addEventListener('click', () => {
                    document.querySelectorAll('.item-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    activeItemId = item.itemId;
                    loadItemDetail(item, detailContainer);
                });

                container.appendChild(div);
            });

            const activeExists = filtered.some(i => i.itemId === activeItemId);
            if (!activeExists && filtered.length > 0) {
                activeItemId = filtered[0].itemId;
                const firstItem = container.querySelector('.item-item');
                if (firstItem) firstItem.classList.add('active');
                loadItemDetail(filtered[0], detailContainer);
            } else if (activeExists) {
                const activeItem = filtered.find(i => i.itemId === activeItemId);
                if (activeItem) {
                    const activeDiv = container.querySelector(`.item-item[data-item-id="${activeItemId}"]`);
                    if (activeDiv) activeDiv.classList.add('active');
                    loadItemDetail(activeItem, detailContainer);
                }
            }
        }

        async function loadItemDetail(item, container) {
            container.innerHTML = '<div class="loader">加载物品数据...</div>';
            try {
                const data = await fetch(item.contentFile + '?t=' + Date.now()).then(r => r.json());
                container.innerHTML = renderDetail(data, item);
            } catch (err) {
                container.innerHTML = `<div class="error-message">加载失败: ${err.message}</div>`;
            }
        }

        function renderDetail(data, item) {
            const name = data.name || item.name;
            const rarity = data.rarity || item.rarity;
            const iconBig = data.icon || item.icon;
            const typeName = TYPE_MAP[data.type] || `类型 ${data.type}`;
            
            // 获取方式
            let obtainHtml = '';
            if (data.obtainWays && data.obtainWays.length) {
                obtainHtml = `
                    <div class="detail-section">
                        <h3>获取方式</h3>
                        <div class="obtain-list">
                            ${data.obtainWays.map(way => `
                                <div class="obtain-item">
                                    <img class="obtain-icon" src="${way.icon}" onerror="this.onerror=null; this.src='';">
                                    <span class="obtain-desc">${way.desc}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            // 合成配方
            let craftHtml = '';
            if (data.craft) {
                craftHtml = `
                    <div class="detail-section">
                        <h3>合成配方</h3>
                        <div class="craft-list">
                            ${JSON.stringify(data.craft)}
                        </div>
                    </div>
                `;
            }

            // 掉落来源
            let droppedHtml = '';
            if (data.droppedBy && data.droppedBy.length) {
                droppedHtml = `
                    <div class="detail-section">
                        <h3>掉落来源</h3>
                        <ul class="dropped-list">
                            ${data.droppedBy.map(src => `<li>${src}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }

            return `
                <div class="item-detail-container">
                    <div class="detail-header">
                        <div class="detail-icon">
                            <img src="${iconBig}" onerror="this.onerror=null; this.src='';">
                        </div>
                        <div class="detail-text">
                            <div class="detail-title-row">
                                <span class="detail-name">${name}</span>
                                <span class="detail-rarity rarity-${rarity}" title="稀有度 ${rarity}"></span>
                                <span class="detail-id">${data.id || item.itemId}</span>
                            </div>
                            <div class="detail-type">${typeName}</div>
                            <div class="detail-desc">${parseText(data.description || '')}</div>
                        </div>
                    </div>
                    ${obtainHtml}
                    ${craftHtml}
                    ${droppedHtml}
                </div>
            `;
        }

        async function refreshModule() {
            const list = document.getElementById('itemList');
            const detail = document.getElementById('itemDetail');
            if (!list || !detail) return;

            const showHidden = getCurrentShowHidden();
            const items = await loadItemManifest(showHidden);
            allItems = items;
            generateFilterButtons();
            renderItemList();
        }

        async function initModule() {
            if (isInitialized) return;
            isInitialized = true;
            if (window.configLoaded) await window.configLoaded;

            window.addEventListener('globalConfigChanged', (e) => {
                searchTerm = '';
                const searchInput = document.getElementById('itemSearchInput');
                if (searchInput) searchInput.value = '';
                // 重置筛选状态
                selectedRarities.clear();
                selectedCategories.clear();
                refreshModule();
            });

            document.getElementById('itemSearchInput')?.addEventListener('input', (e) => {
                searchTerm = e.target.value;
                renderItemList();
            });

            await refreshModule();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initModule);
        } else {
            initModule();
        }
    })();
</script>
