<!-- plugin/equip.html -->
<link rel="stylesheet" href="/theme/equip.css">

<div class="equip-module">
    <div class="left-column">
        <div class="list-search">
            <input type="text" id="equipSearchInput" placeholder="搜索装备套组 (名称/ID)" class="search-input">
        </div>
        <div class="equip-list" id="equipList"></div>
    </div>
    <div class="equip-detail" id="equipDetail">
        <div class="loader">加载装备数据...</div>
    </div>
</div>

<script>
    (function() {
        let allSuits = [];
        let activeSuitId = null;
        let isInitialized = false;
        let searchTerm = '';

        const IMAGE_BASE_PATH = '/public/images/';

        function getCurrentShowHidden() {
            return window.akeData?.getConfig().showHidden ?? false;
        }

        function parseText(text) {
            return window.parseText(text, IMAGE_BASE_PATH);
        }

        // 辅助：格式化数值 - 绝对值小于1显示为百分比，否则保留一位小数
        // 特殊处理：如果描述包含“全伤害减免”，则显示 (1 - val) 的百分比
        function formatValue(desc, val) {
            if (typeof val !== 'number') return val;

            // 特殊处理：全伤害减免（优先执行）
            if (desc && desc.includes('全伤害减免')) {
                const newVal = 1 - val;
                if (Math.abs(newVal) < 1) {
                    return (newVal * 100).toFixed(2) + '%';
                }
                return newVal.toFixed(2);
            }
        
            // 根据描述词决定小数位数
            let precision = 2; // 默认保留1位
            if (desc) {
                if (desc.includes('暴击') || desc.includes('充能')) {
                    precision = 2; // 暴击、充能保留2位
                } else if (desc.includes('源石技艺强度') || desc.includes('防御力') || desc.includes('力量') || desc.includes('智识') || desc.includes('敏捷') || desc.includes('意志')) {
                    precision = 1; // 源石技艺强度保留1位（明确指定）
                }
                // 可继续添加其他关键词
            }
        
            // 若数值绝对值小于1，视为百分比值（如 0.123 → 12.3%）
            if (Math.abs(val) < 1) {
                return (val * 100).toFixed(precision) + '%';
            }
            // 否则直接显示小数
            return val.toFixed(precision);
        }

        function filterSuitsBySearch(suits) {
            if (!searchTerm) return suits;
            const term = searchTerm.toLowerCase();
            return suits.filter(s => 
                (s.name && s.name.toLowerCase().includes(term)) || 
                (s.suitID && s.suitID.toLowerCase().includes(term))
            );
        }

        function replacePlaceholders(desc, valueMap) {
            const lowerValueMap = {};
            for (const [key, val] of Object.entries(valueMap)) {
                lowerValueMap[key.toLowerCase()] = val;
            }
            return desc.replace(/\{([^}]+)\}/g, (match, p1) => {
                const parts = p1.split(':');
                const expr = parts[0].replace(/\s+/g, '');
                const format = parts[1] ? parts[1].trim() : '';
                const varNames = expr.match(/[a-zA-Z_][a-zA-Z0-9_]*/g) || [];
                const missingVar = varNames.find(name => !(name.toLowerCase() in lowerValueMap));
                if (missingVar) return match;
                let evalExpr = expr;
                for (const name of varNames) {
                    const value = lowerValueMap[name.toLowerCase()];
                    const regex = new RegExp(`\\b${name}\\b`, 'g');
                    evalExpr = evalExpr.replace(regex, `(${value})`);
                }
                let result;
                try {
                    result = new Function('return ' + evalExpr)();
                } catch (e) {
                    return match;
                }
                if (format.includes('%')) return (result * 100).toFixed(1) + '%';
                if (format.includes('.')) {
                    const precision = format.split('.')[1]?.length || 1;
                    return result.toFixed(precision);
                }
                if (format.includes('0')) return Math.round(result);
                return result.toString();
            });
        }

        async function loadEquipManifest(showHidden) {
            try {
                const res = await fetch('/public/CH/equip/manifest.json?t=' + Date.now());
                if (!res.ok) throw new Error('无法加载装备清单');
                const all = await res.json();
                let suits = showHidden ? all : all.filter(s => !s.hidden);
                suits.sort((a, b) => (a.priority || 999) - (b.priority || 999));
                return suits;
            } catch (err) {
                console.error('加载装备清单失败:', err);
                return [];
            }
        }

        function renderEquipList() {
            const container = document.getElementById('equipList');
            const detailContainer = document.getElementById('equipDetail');
            if (!container) return;

            const filtered = filterSuitsBySearch(allSuits);

            container.innerHTML = '';
            if (filtered.length === 0) {
                container.innerHTML = '<div class="loader">无匹配套组</div>';
                if (detailContainer) detailContainer.innerHTML = '<div class="loader">请选择套组</div>';
                activeSuitId = null;
                return;
            }

            filtered.forEach((suit, index) => {
                const item = document.createElement('div');
                item.className = `equip-item ${suit.suitID === activeSuitId ? 'active' : (index === 0 && !activeSuitId ? 'active' : '')}`;
                item.dataset.suitId = suit.suitID;
                item.dataset.contentFile = suit.contentFile;

                const rarityBar = document.createElement('span');
                rarityBar.className = `rarity-bar rarity-${suit.rarity}`;
                rarityBar.title = `稀有度 ${suit.rarity}`;

                const icon = document.createElement('img');
                icon.className = 'equip-icon';
                icon.src = suit.icon || '';
                icon.onerror = function() { this.onerror = null; this.src = ''; };

                const info = document.createElement('div');
                info.className = 'equip-info';
                const nameDiv = document.createElement('div');
                nameDiv.className = 'equip-name';
                nameDiv.textContent = suit.name;
                const idDiv = document.createElement('div');
                idDiv.className = 'equip-id';
                idDiv.textContent = suit.suitID;
                info.appendChild(nameDiv);
                info.appendChild(idDiv);

                item.appendChild(rarityBar);
                item.appendChild(icon);
                item.appendChild(info);

                item.addEventListener('click', () => {
                    document.querySelectorAll('.equip-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    activeSuitId = suit.suitID;
                    loadEquipDetail(suit, detailContainer);
                });

                container.appendChild(item);
            });

            const activeExists = filtered.some(s => s.suitID === activeSuitId);
            if (!activeExists && filtered.length > 0) {
                activeSuitId = filtered[0].suitID;
                const firstItem = container.querySelector('.equip-item');
                if (firstItem) firstItem.classList.add('active');
                loadEquipDetail(filtered[0], detailContainer);
            } else if (activeExists) {
                const activeSuit = filtered.find(s => s.suitID === activeSuitId);
                if (activeSuit) {
                    const activeItem = container.querySelector(`.equip-item[data-suit-id="${activeSuitId}"]`);
                    if (activeItem) activeItem.classList.add('active');
                    loadEquipDetail(activeSuit, detailContainer);
                }
            }
        }

        function renderSubStats(substats) {
            if (!substats) return '';

            const entries = Object.entries(substats);
            if (entries.length === 0) return '';

            let levelCount = 0;
            const rows = [];
            entries.forEach(([key, stat]) => {
                const valArray = stat.value;
                if (!Array.isArray(valArray) || valArray.length === 0) return;
                if (levelCount === 0) levelCount = valArray.length;
                const formatted = valArray.map(v => formatValue(stat.desc, v));
                rows.push({
                    desc: stat.desc,
                    values: formatted
                });
            });

            if (levelCount === 0) return '';

            let headerCells = '<th></th>';
            for (let i = 0; i < levelCount; i++) {
                headerCells += `<th>Lv.${i+1}</th>`;
            }
            const header = `<thead><tr>${headerCells}</tr></thead>`;

            let bodyRows = '';
            rows.forEach(row => {
                let cells = `<td>${row.desc}</td>`;
                for (let i = 0; i < levelCount; i++) {
                    const val = (i < row.values.length) ? row.values[i] : '-';
                    cells += `<td class="value-cell">${val}</td>`;
                }
                bodyRows += `<tr>${cells}</tr>`;
            });
            const body = `<tbody>${bodyRows}</tbody>`;

            return `<table class="substat-table">${header}${body}</table>`;
        }

        function renderEquipItems(equipObj) {
            let html = '';
            for (let itemId in equipObj) {
                const item = equipObj[itemId];
                const mainDesc = item.主词条.desc;
                const mainVal = item.主词条.value;
                const mainFormatted = formatValue(mainDesc, mainVal);
                const substatsHtml = renderSubStats(item.副词条);
                const iconSrc = item.icon || '';
                const rarityDot = `<span class="rarity-dot rarity-${item.rarity}" title="稀有度 ${item.rarity}"></span>`;

                html += `
                    <div class="equip-item-card">
                        <div class="card-header">
                            <img class="card-icon" src="${iconSrc}" onerror="this.onerror=null; this.src='';">
                            <div class="card-title">
                                <span class="card-name">${item.name}</span>
                                ${rarityDot}
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="card-meta">
                                <span class="card-slot">${item.部位}</span>
                                <span class="card-level">Lv.${item.level}</span>
                            </div>
                            <div class="card-mainstat">
                                <span class="mainstat-desc">${mainDesc}</span>
                                <span class="mainstat-value">${mainFormatted}</span>
                            </div>
                            ${substatsHtml}
                        </div>
                    </div>
                `;
            }
            return html;
        }

        async function loadEquipDetail(suit, container) {
            container.innerHTML = '<div class="loader">加载套组数据...</div>';
            try {
                const data = await fetch(suit.contentFile + '?t=' + Date.now()).then(r => r.json());
                container.innerHTML = renderDetail(data, suit);
            } catch (err) {
                container.innerHTML = `<div class="error-message">加载失败: ${err.message}</div>`;
            }
        }

        function renderDetail(data, suit) {
            const suitName = data.套组名称 || suit.name;
            let suitDesc = data.技能描述 || '';
            const valueMap = data.value || {};

            suitDesc = replacePlaceholders(suitDesc, valueMap);
            suitDesc = parseText(suitDesc);
            suitDesc = suitDesc.replace(/\n/g, '<br>');

            const suitIcon = data.icon || suit.icon || '';
            const equipItemsHtml = renderEquipItems(data.equip || {});

            return `
                <div class="equip-detail-container">
                    <div class="suit-header">
                        <div class="suit-icon">
                            <img src="${suitIcon}" onerror="this.onerror=null; this.src='';">
                        </div>
                        <div class="suit-info">
                            <div class="suit-title-row">
                                <span class="suit-name">${suitName}</span>
                                <span class="suit-rarity rarity-${suit.rarity}" title="稀有度 ${suit.rarity}"></span>
                                <span class="detail-id">${suit.suitID}</span>
                            </div>
                            <div class="suit-desc">${suitDesc}</div>
                        </div>
                    </div>
                    <h3>套装部件</h3>
                    <div class="equip-items-grid">
                        ${equipItemsHtml}
                    </div>
                </div>
            `;
        }

        async function refreshModule() {
            const list = document.getElementById('equipList');
            const detail = document.getElementById('equipDetail');
            if (!list || !detail) return;
            const showHidden = getCurrentShowHidden();
            const suits = await loadEquipManifest(showHidden);
            allSuits = suits;
            renderEquipList();
        }

        async function initModule() {
            if (isInitialized) return;
            isInitialized = true;
            if (window.configLoaded) await window.configLoaded;

            window.addEventListener('globalConfigChanged', (e) => {
                searchTerm = '';
                const searchInput = document.getElementById('equipSearchInput');
                if (searchInput) searchInput.value = '';
                refreshModule();
            });

            document.getElementById('equipSearchInput')?.addEventListener('input', (e) => {
                searchTerm = e.target.value;
                renderEquipList();
            });

            await refreshModule();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initModule);
        } else {
            initModule();
        }
    })();
</script>
