<!-- plugin/weapon.html -->
<link rel="stylesheet" href="/theme/weapon.css">

<div class="weapon-module">
    <!-- 移动端左侧栏按钮（仅小屏幕显示） -->
    <div class="mobile-list-btn" id="mobileListBtn">📋 列表</div>
    <div id="mobileListOverlay" class="mobile-list-overlay">
        <div class="mobile-list-container">
            <div class="mobile-list-header">选择武器</div>
            <div class="mobile-list-content" id="mobileListContent"></div>
        </div>
    </div>
    <div class="weapon-list" id="weaponList">
        <div class="list-search-fixed">
            <input type="text" id="weaponSearchInput" placeholder="搜索武器 (名称/ID)" class="search-input">
        </div>
        <!-- 新增筛选栏 -->
        <div class="filter-bar" id="weaponFilterBar">
            <div class="filter-section">
                <span class="filter-label">星级:</span>
                <div class="filter-buttons" id="weaponRarityFilter"></div>
            </div>
            <div class="filter-section">
                <span class="filter-label">类型:</span>
                <div class="filter-buttons" id="weaponTypeFilter"></div>
            </div>
        </div>
        <div class="list-items" id="weaponListItems"></div>
    </div>
    <div class="weapon-detail" id="weaponDetail">
        <div class="loader">加载武器数据...</div>
    </div>
</div>

<script>
    (function() {
        let allWeapons = [];
        let activeWeaponId = null;
        let isInitialized = false;
        let weaponLevelsToShow = null;
        let showAllWeaponLevels = false;
        let searchTerm = '';
        let currentWeaponData = null;
        let currentWeapon = null;

        // 新增筛选状态
        let selectedRarities = new Set();   // 选中的稀有度
        let selectedTypes = new Set();      // 选中的武器类型ID

        const IMAGE_BASE_PATH = '/public/images/';
        const WEAPON_TYPE_MAP = {
            1: "单手剑",
            2: "施术单元",
            3: "双手剑",
            5: "长柄武器",
            6: "手铳"
        };

        function getCurrentShowHidden() {
            return window.akeData?.getConfig().showHidden ?? false;
        }

        function parseText(text) {
            return window.parseText(text, IMAGE_BASE_PATH);
        }

        function parseLevelInput(input, maxLevel = 90) {
            if (!input || input.trim() === '') return [];
            const parts = input.split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n) && n >= 1 && n <= maxLevel);
            return parts.length ? parts : [maxLevel];
        }

        // 合并搜索和筛选
        function filterWeapons(weapons) {
            return weapons.filter(w => {
                // 搜索过滤
                if (searchTerm) {
                    const term = searchTerm.toLowerCase();
                    const nameMatch = w.title && w.title.toLowerCase().includes(term);
                    const idMatch = w.weaponId && w.weaponId.toLowerCase().includes(term);
                    if (!nameMatch && !idMatch) return false;
                }
                // 稀有度筛选
                if (selectedRarities.size > 0 && !selectedRarities.has(w.rarity)) {
                    return false;
                }
                // 类型筛选
                if (selectedTypes.size > 0 && !selectedTypes.has(w.weapontype)) {
                    return false;
                }
                return true;
            });
        }

        // 生成筛选按钮
        function generateFilterButtons() {
            const rarityContainer = document.getElementById('weaponRarityFilter');
            const typeContainer = document.getElementById('weaponTypeFilter');
            if (!rarityContainer || !typeContainer) return;

            // 稀有度按钮（1-6，只显示存在的）
            const existingRarities = new Set(allWeapons.map(w => w.rarity));
            const rarityBtns = [];
            for (let r = 1; r <= 6; r++) {
                if (existingRarities.has(r)) {
                    const btn = document.createElement('span');
                    btn.className = `filter-btn ${selectedRarities.has(r) ? 'active' : ''}`;
                    btn.dataset.rarity = r;
                    btn.textContent = r + '星';
                    btn.addEventListener('click', () => {
                        if (selectedRarities.has(r)) {
                            selectedRarities.delete(r);
                        } else {
                            selectedRarities.add(r);
                        }
                        btn.classList.toggle('active');
                        renderWeaponList();
                    });
                    rarityBtns.push(btn);
                }
            }
            rarityContainer.innerHTML = '';
            rarityBtns.forEach(btn => rarityContainer.appendChild(btn));

            // 类型按钮（从WEAPON_TYPE_MAP中取，只显示存在的）
            const existingTypes = new Set(allWeapons.map(w => w.weapontype));
            const typeBtns = [];
            for (const [typeId, typeName] of Object.entries(WEAPON_TYPE_MAP)) {
                const id = parseInt(typeId, 10);
                if (existingTypes.has(id)) {
                    const btn = document.createElement('span');
                    btn.className = `filter-btn ${selectedTypes.has(id) ? 'active' : ''}`;
                    btn.dataset.type = id;
                    btn.textContent = typeName;
                    btn.addEventListener('click', () => {
                        if (selectedTypes.has(id)) {
                            selectedTypes.delete(id);
                        } else {
                            selectedTypes.add(id);
                        }
                        btn.classList.toggle('active');
                        renderWeaponList();
                    });
                    typeBtns.push(btn);
                }
            }
            typeContainer.innerHTML = '';
            typeBtns.forEach(btn => typeContainer.appendChild(btn));
        }

        // 移动端左侧列表
        const mobileBtn = document.getElementById('mobileListBtn');
        const mobileOverlay = document.getElementById('mobileListOverlay');
        const mobileContent = document.getElementById('mobileListContent');
            
        function buildMobileList() {
            const filtered = filterWeapons(allWeapons);
            mobileContent.innerHTML = '';
            filtered.forEach(weapon => {
                const item = document.createElement('div');
                item.className = 'mobile-list-item';
                if (weapon.weaponId === activeWeaponId) item.classList.add('active');
                item.innerHTML = `
                    <div class="item-name">${weapon.title}</div>
                    <div class="item-id">${weapon.weaponId}</div>
                `;
                item.addEventListener('click', () => {
                    // 加载武器详情
                    activeWeaponId = weapon.weaponId;
                    loadWeaponDetail(weapon, document.getElementById('weaponDetail'));
                    closeMobileList();
                    // 同步高亮（如果左侧列表可见，也应该更新，但已隐藏）
                });
                mobileContent.appendChild(item);
            });
        }
        
        function openMobileList() {
            buildMobileList();
            mobileOverlay.style.display = 'flex';
        }
        
        function closeMobileList() {
            mobileOverlay.style.display = 'none';
        }
        
        if (mobileBtn) {
            mobileBtn.addEventListener('click', openMobileList);
        }
        if (mobileOverlay) {
            mobileOverlay.addEventListener('click', (e) => {
                if (e.target === mobileOverlay) closeMobileList();
            });
        }

        async function loadWeaponManifest(showHidden) {
            try {
                const res = await fetch('/public/CH/weapon/manifest.json?t=' + Date.now());
                if (!res.ok) throw new Error('无法加载武器清单');
                const allWeapons = await res.json();
                let weapons = showHidden ? allWeapons : allWeapons.filter(w => !w.hidden);
                weapons.sort((a, b) => (a.priority || 999) - (b.priority || 999));
                return weapons;
            } catch (err) {
                console.error('加载武器清单失败:', err);
                return [];
            }
        }

        function renderWeaponList() {
            const listItemsContainer = document.getElementById('weaponListItems');
            const detailContainer = document.getElementById('weaponDetail');
            if (!listItemsContainer) return;

            const filtered = filterWeapons(allWeapons);

            listItemsContainer.innerHTML = '';
            if (filtered.length === 0) {
                listItemsContainer.innerHTML = '<div class="loader">无匹配武器</div>';
                if (detailContainer) detailContainer.innerHTML = '<div class="loader">请选择武器</div>';
                activeWeaponId = null;
                return;
            }

            filtered.forEach((weapon, index) => {
                const item = document.createElement('div');
                item.className = `weapon-item ${weapon.weaponId === activeWeaponId ? 'active' : (index === 0 && !activeWeaponId ? 'active' : '')}`;
                item.dataset.weaponId = weapon.weaponId;
                item.dataset.contentFile = weapon.contentFile;

                const rarityBar = document.createElement('span');
                rarityBar.className = `rarity-bar rarity-${weapon.rarity}`;
                rarityBar.title = `稀有度 ${weapon.rarity}`;

                const icon = document.createElement('img');
                icon.className = 'weapon-icon';
                icon.src = weapon.icon;
                icon.onerror = function() { this.onerror = null; this.src = ''; };

                const info = document.createElement('div');
                info.className = 'weapon-info';
                const title = document.createElement('div');
                title.className = 'weapon-title';
                title.textContent = weapon.title;
                const idSpan = document.createElement('div');
                idSpan.className = 'weapon-id';
                idSpan.textContent = weapon.weaponId;
                info.appendChild(title);
                info.appendChild(idSpan);

                const typeTag = document.createElement('span');
                typeTag.className = 'weapon-type-tag';
                const typeName = WEAPON_TYPE_MAP[weapon.weapontype] || '未知';
                typeTag.textContent = typeName;
                typeTag.title = typeName;

                item.appendChild(rarityBar);
                item.appendChild(icon);
                item.appendChild(info);
                item.appendChild(typeTag);

                item.addEventListener('click', () => {
                    document.querySelectorAll('.weapon-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    activeWeaponId = weapon.weaponId;
                    loadWeaponDetail(weapon, detailContainer);
                });

                listItemsContainer.appendChild(item);
            });

            const activeExists = filtered.some(w => w.weaponId === activeWeaponId);
            if (!activeExists && filtered.length > 0) {
                activeWeaponId = filtered[0].weaponId;
                const firstItem = listItemsContainer.querySelector('.weapon-item');
                if (firstItem) firstItem.classList.add('active');
                loadWeaponDetail(filtered[0], detailContainer);
            } else if (activeExists) {
                const activeWeapon = filtered.find(w => w.weaponId === activeWeaponId);
                if (activeWeapon) {
                    const activeItem = listItemsContainer.querySelector(`.weapon-item[data-weapon-id="${activeWeaponId}"]`);
                    if (activeItem) activeItem.classList.add('active');
                    loadWeaponDetail(activeWeapon, detailContainer);
                }
            }
        }

        // 原有 renderAtkRows 函数保持不变
        function renderAtkRows(data, showAll, levelsToShow) {
            const allRows = [];
            for (let i = 0; i < 90; i++) {
                const level = i + 1;
                const atk = data.baseAtk[i] || '-';
                allRows.push(`<tr data-level="${level}"><td>${level}</td><td>${atk}</td></tr>`);
            }
        
            if (!levelsToShow || showAll) return allRows.join('');
        
            const levelSet = new Set(levelsToShow);
            const filtered = allRows.filter(row => {
                const match = row.match(/data-level="(\d+)"/);
                return match && levelSet.has(parseInt(match[1], 10));
            });
        
            return filtered.length ? filtered.join('') : allRows.filter(r => r.includes(`data-level="${Math.max(...levelsToShow)}"`)).join('');
        }

        async function loadWeaponDetail(weapon, container) {
            container.innerHTML = '<div class="loader">加载武器数据...</div>';
            try {
                const data = await fetch(weapon.contentFile + '?t=' + Date.now()).then(r => r.json());
                currentWeaponData = data;
                currentWeapon = weapon;
                container.innerHTML = renderDetail(data, weapon);
            
                // 绑定局部更新按钮
                const toggleBtn = container.querySelector('.toggle-weapon-levels-btn');
                if (toggleBtn) {
                    toggleBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        showAllWeaponLevels = !showAllWeaponLevels;
                        updateAtkTable();
                    });
                }
            } catch (err) {
                container.innerHTML = `<div class="error-message">加载失败: ${err.message}</div>`;
            }
        }

        function updateAtkTable() {
            const tbody = document.querySelector('.atk-table tbody');
            if (!tbody || !currentWeaponData) return;
            const newRows = renderAtkRows(currentWeaponData, showAllWeaponLevels, weaponLevelsToShow);
            tbody.innerHTML = newRows;

            const btn = document.querySelector('.toggle-weapon-levels-btn');
            if (btn) btn.textContent = showAllWeaponLevels ? '收起多余等级' : '展开所有等级';
        }

        function renderDetail(data, weapon) {
            const atkRows = [];
            for (let i = 0; i < 90; i++) {
                const level = i + 1;
                const atk = data.baseAtk[i] || '-';
                atkRows.push(`<tr data-level="${level}"><td>${level}</td><td>${atk}</td></tr>`);
            }

            let rowsToRender = atkRows;
            if (weaponLevelsToShow && !showAllWeaponLevels) {
                const levelSet = new Set(weaponLevelsToShow);
                rowsToRender = atkRows.filter(row => {
                    const match = row.match(/data-level="(\d+)"/);
                    return match && levelSet.has(parseInt(match[1], 10));
                });
            }
            if (rowsToRender.length === 0 && weaponLevelsToShow && weaponLevelsToShow.length > 0) {
                const maxLevel = Math.max(...weaponLevelsToShow);
                const found = atkRows.find(r => r.includes(`data-level="${maxLevel}"`));
                if (found) rowsToRender = [found];
            }

            const atkRowsHtml = rowsToRender.join('');
            const toggleButtonHtml = weaponLevelsToShow ? `
                <div style="display: flex; justify-content: flex-end; margin-top: 4px;">
                    <button class="toggle-weapon-levels-btn" style="background: var(--button-bg, #e0e8f0); border: 1px solid var(--border-color); border-radius: 16px; padding: 4px 12px; cursor: pointer;">${showAllWeaponLevels ? '收起多余等级' : '展开所有等级'}</button>
                </div>
            ` : '';

            const skillHtml = data.skilllist.map(skill => {
                const blackboard = skill.blackboard;
                const levelCount = 9;
                const rows = [];
                for (let lv = 1; lv <= levelCount; lv++) {
                    const idx = lv - 1;
                    const replaceMap = {};
                    blackboard.forEach(item => {
                        const key = item.key;
                        const arr = item.value;
                        let val = (idx < arr.length) ? arr[idx] : arr[arr.length - 1];
                        replaceMap[key] = val;
                    });
                    let desc = skill.description;
                    desc = desc.replace(/\{([^}]+)\}/g, (match, p1) => {
                        const parts = p1.split(':');
                        const expr = parts[0].trim();
                        const format = parts[1] ? parts[1].trim() : '';
                        const varNames = expr.match(/[a-zA-Z_][a-zA-Z0-9_]*/g) || [];
                        const missingVar = varNames.find(name => !(name in replaceMap));
                        if (missingVar) return match;
                        let evalExpr = expr;
                        for (const name of varNames) {
                            const value = replaceMap[name];
                            evalExpr = evalExpr.replace(new RegExp(`\\b${name}\\b`, 'g'), value);
                        }
                        let result;
                        try {
                            result = new Function('return ' + evalExpr)();
                        } catch (e) {
                            return match;
                        }
                        if (format.includes('%')) return (result * 100).toFixed(1) + '%';
                        if (format.includes('0')) return Math.round(result);
                        if (format.includes('.')) {
                            const precision = format.split('.')[1]?.length || 0;
                            return result.toFixed(precision);
                        }
                        return result;
                    });
                    desc = parseText(desc);
                    rows.push(`
                        <div class="skill-level-row">
                            <span class="skill-level">Lv.${lv}</span>
                            <span class="skill-desc">${desc}</span>
                        </div>
                    `);
                }
                return `
                    <div class="skill-item">
                        <div class="skill-name">${skill.skillName}</div>
                        <div class="skill-levels">${rows.join('')}</div>
                    </div>
                `;
            }).join('');

            return `
                <div class="detail-header">
                    <div class="detail-left">
                        <div class="detail-left-top">
                            <div class="detail-icon">
                                <img src="${data.iconbig || data.icon}" onerror="this.onerror=null; this.src='';">
                            </div>
                            <div class="detail-text">
                                <div class="detail-title-row">
                                    <span class="detail-title">${data.title}</span>
                                    <span class="detail-rarity rarity-${data.rarity}" title="稀有度 ${data.rarity}"></span>
                                    <span class="detail-id">${weapon.weaponId}</span>
                                </div>
                                <div class="detail-desc">${data.desc}</div>
                                <div class="detail-deco">${data.decoDesc || ''}</div>
                            </div>
                        </div>
                        <div class="detail-atk">
                            <h3>基础攻击力 (1-90级)</h3>
                            <div class="atk-table-container">
                                <table class="atk-table">
                                    <thead><tr><th>等级</th><th>攻击力</th></tr></thead>
                                    <tbody>${renderAtkRows(data, showAllWeaponLevels, weaponLevelsToShow)}</tbody>
                                </table>
                            </div>
                            ${toggleButtonHtml}
                        </div>
                    </div>
                    <div class="detail-right">
                        <div class="detail-iconfull">
                            <img src="${data.iconfull || ''}" onerror="this.style.display='none'">
                        </div>
                    </div>
                </div>
                <h3>技能数据</h3>
                <div class="skill-list">
                    ${skillHtml}
                </div>
                <div class="weapon-desc">${data.weaponDesc || ''}</div>
            `;
        }

        async function refreshWeaponModule() {
            const weaponList = document.getElementById('weaponList');
            const weaponDetail = document.getElementById('weaponDetail');
            if (!weaponList || !weaponDetail) return;
            const showHidden = getCurrentShowHidden();
            const weapons = await loadWeaponManifest(showHidden);
            allWeapons = weapons;
            // 生成筛选按钮
            generateFilterButtons();
            renderWeaponList();
        }

        async function initWeaponModule() {
            if (isInitialized) return;
            isInitialized = true;
            if (window.configLoaded) await window.configLoaded;
            const settings = window.akeData?.getLevelSettings?.() || {};
            if (settings.enabled) {
                weaponLevelsToShow = parseLevelInput(settings.weaponLevels, 90);
            }
            window.addEventListener('globalConfigChanged', (e) => {
                searchTerm = '';
                const searchInput = document.getElementById('weaponSearchInput');
                if (searchInput) searchInput.value = '';
                const settings = window.akeData?.getLevelSettings?.() || {};
                if (settings.enabled) {
                    weaponLevelsToShow = parseLevelInput(settings.weaponLevels, 90);
                } else {
                    weaponLevelsToShow = null;
                }
                showAllWeaponLevels = false;
                // 重置筛选状态
                selectedRarities.clear();
                selectedTypes.clear();
                refreshWeaponModule();
            });

            document.getElementById('weaponSearchInput')?.addEventListener('input', (e) => {
                searchTerm = e.target.value;
                renderWeaponList();
            });

            await refreshWeaponModule();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initWeaponModule);
        } else {
            initWeaponModule();
        }
    })();
</script>
