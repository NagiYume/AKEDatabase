<!-- plugin/weapon.html -->
<link rel="stylesheet" href="/theme/weapon.css">

<div class="weapon-module">
    <div class="weapon-list" id="weaponList"></div>
    <div class="weapon-detail" id="weaponDetail">
        <div class="loader">加载武器数据...</div>
    </div>
</div>

<!-- 超链接浮窗容器 -->
<div id="hyperlink-tooltip" class="hyperlink-tooltip"></div>

<script>
    (function() {
        // ---------- 模块内部状态 ----------
        let currentWeapons = [];
        let activeWeaponId = null;
        let isInitialized = false;
        let textstyleConfig = null;
        let hyperlinkConfig = null;
        let textstylePromise = null;
        let hyperlinkPromise = null;

        const IMAGE_BASE_PATH = '/public/images/';

        // ---------- 辅助函数 ----------
        function getCurrentShowHidden() {
            return window.akeData?.getConfig().showHidden ?? false;
        }

        async function loadTextStyleConfig() {
            if (textstyleConfig) return textstyleConfig;
            if (textstylePromise) return textstylePromise;
            textstylePromise = (async () => {
                try {
                    const res = await fetch('/theme/textstyle.json?t=' + Date.now());
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    textstyleConfig = await res.json();
                    return textstyleConfig;
                } catch (err) {
                    console.warn('加载 textstyle.json 失败', err);
                    textstyleConfig = {};
                    return textstyleConfig;
                } finally {
                    textstylePromise = null;
                }
            })();
            return textstylePromise;
        }

        async function loadHyperlinkConfig() {
            if (hyperlinkConfig) return hyperlinkConfig;
            if (hyperlinkPromise) return hyperlinkPromise;
            hyperlinkPromise = (async () => {
                try {
                    const res = await fetch('/theme/hyperlink.json?t=' + Date.now());
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    hyperlinkConfig = await res.json();
                    return hyperlinkConfig;
                } catch (err) {
                    console.warn('加载 hyperlink.json 失败', err);
                    hyperlinkConfig = {};
                    return hyperlinkConfig;
                } finally {
                    hyperlinkPromise = null;
                }
            })();
            return hyperlinkPromise;
        }

        // ---------- 递归解析文本（支持嵌套标签）----------
        function parseText(text, hyperlinkCfg, textstyleCfg) {
            if (!text) return '';
            let result = '';
            let i = 0;
            const len = text.length;

            while (i < len) {
                if (text[i] === '<') {
                    // 检查 <image...> 自闭合标签
                    if (text.substr(i, 6) === '<image') {
                        const endIdx = text.indexOf('>', i);
                        if (endIdx === -1) { result += text[i]; i++; continue; }
                        const tagContent = text.substring(i + 1, endIdx);
                        const imgMatch = tagContent.match(/image="([^"]+)"\s*scale=([0-9.]+)/);
                        if (imgMatch) {
                            let path = imgMatch[1];
                            const scale = imgMatch[2];
                            if (!path.includes('.')) path += '.png';
                            result += `<img src="${IMAGE_BASE_PATH}${path}" style="transform: scale(${scale}); width: auto; height: 1em; display: inline-block; vertical-align: middle;" class="inline-icon">`;
                        }
                        i = endIdx + 1;
                        continue;
                    }
                    // 检查 <@tag> 或 <#tag>
                    else if (text[i+1] === '@' || text[i+1] === '#') {
                        const prefix = text[i+1];
                        const tagNameEnd = text.indexOf('>', i);
                        if (tagNameEnd === -1) { result += text[i]; i++; continue; }
                        const tagName = text.substring(i+2, tagNameEnd);

                        // 寻找匹配的闭合标签 </> (处理嵌套)
                        let depth = 1;
                        let pos = tagNameEnd + 1;
                        while (pos < len) {
                            if (text[pos] === '<') {
                                if (text.substr(pos, 3) === '</>') {
                                    depth--;
                                    if (depth === 0) {
                                        // 找到匹配闭合
                                        const innerContent = text.substring(tagNameEnd + 1, pos);
                                        // 递归解析内部内容
                                        const renderedInner = parseText(innerContent, hyperlinkCfg, textstyleCfg);

                                        let tagResult = '';
                                        if (prefix === '@') {
                                            const styleDef = textstyleCfg?.[tagName];
                                            if (!styleDef) {
                                                // 默认处理：若标签含 info 则灰色
                                                tagResult = tagName.includes('info') ? `<span style="color: #999999;">${renderedInner}</span>` : renderedInner;
                                            } else {
                                                const color = styleDef.color?.[0] || null;
                                                const image = styleDef.image?.[0] || null;
                                                const scale = styleDef.scale?.[0] || 1;
                                                if (image) {
                                                    tagResult = `<span class="textstyle-icon-text"><img src="/${image}" style="transform: scale(${scale});" alt=""><span style="${color ? `color: ${color};` : ''}">${renderedInner}</span></span>`;
                                                } else {
                                                    tagResult = color ? `<span style="color: ${color};">${renderedInner}</span>` : renderedInner;
                                                }
                                            }
                                        } else if (prefix === '#') {
                                            const hyperDef = hyperlinkCfg?.[tagName];
                                            if (hyperDef) {
                                                const styleid = hyperDef.styleid;
                                                let styleAttr = '';
                                                if (styleid && textstyleCfg?.[styleid]) {
                                                    const styleDef = textstyleCfg[styleid];
                                                    const color = styleDef.color?.[0] || null;
                                                    const image = styleDef.image?.[0] || null;
                                                    const scale = styleDef.scale?.[0] || 1;
                                                    if (image) {
                                                        // 带图标的超链接
                                                        tagResult = `<span class="textstyle-icon-text">
                                                            <img src="/${image}" style="transform: scale(${scale});" alt="">
                                                            <span class="tag-hyperlink" data-tag-id="${tagName}" style="${color ? `color: ${color};` : ''}">${renderedInner}</span>
                                                        </span>`;
                                                    } else if (color) {
                                                        // 仅有颜色
                                                        tagResult = `<span class="tag-hyperlink" data-tag-id="${tagName}" style="color: ${color};">${renderedInner}</span>`;
                                                    } else {
                                                        // 无样式，普通超链接
                                                        tagResult = `<span class="tag-hyperlink" data-tag-id="${tagName}">${renderedInner}</span>`;
                                                    }
                                                } else {
                                                    // 无 styleid 或样式未找到，普通超链接
                                                    tagResult = `<span class="tag-hyperlink" data-tag-id="${tagName}">${renderedInner}</span>`;
                                                }
                                            } else {
                                                tagResult = renderedInner;
                                            }
                                        }
                                        result += tagResult;
                                        i = pos + 3; // 跳过 </> 
                                        break;
                                    }
                                    pos += 3;
                                } else if (text[pos+1] === '@' || text[pos+1] === '#' || text.substr(pos, 6) === '<image') {
                                    depth++;
                                    pos++;
                                } else {
                                    pos++;
                                }
                            } else {
                                pos++;
                            }
                        }
                        if (pos >= len) { // 未找到匹配闭合，原样输出
                            result += text.substring(i, tagNameEnd + 1);
                            i = tagNameEnd + 1;
                        }
                        continue;
                    } else {
                        result += text[i];
                        i++;
                    }
                } else {
                    result += text[i];
                    i++;
                }
            }
            return result;
        }

        // ---------- 武器数据加载 ----------
        async function loadWeaponManifest(showHidden) {
            try {
                const res = await fetch('/public/CH/weapon/manifest.json?t=' + Date.now());
                if (!res.ok) throw new Error('无法加载武器清单');
                const allWeapons = await res.json();
                return showHidden ? allWeapons : allWeapons.filter(w => !w.hidden);
            } catch (err) {
                console.error('加载武器清单失败:', err);
                return [];
            }
        }

        // ---------- 渲染左侧武器列表 ----------
        function renderWeaponList(weapons, container) {
            container.innerHTML = '';
            if (weapons.length === 0) {
                container.innerHTML = '<div class="loader">暂无可用武器</div>';
                return;
            }

            weapons.forEach((weapon, index) => {
                const item = document.createElement('div');
                item.className = `weapon-item ${weapon.weaponId === activeWeaponId ? 'active' : (index === 0 && !activeWeaponId ? 'active' : '')}`;
                item.dataset.weaponId = weapon.weaponId;
                item.dataset.contentFile = weapon.contentFile;

                const icon = document.createElement('img');
                icon.className = 'weapon-icon';
                icon.src = weapon.icon;
                icon.onerror = () => icon.src = '';

                const info = document.createElement('div');
                info.className = 'weapon-info';

                const title = document.createElement('span');
                title.className = 'weapon-title';
                title.textContent = weapon.title;

                const rarityDot = document.createElement('span');
                rarityDot.className = `rarity-dot rarity-${weapon.rarity}`;
                rarityDot.title = `稀有度 ${weapon.rarity}`;

                info.appendChild(title);
                item.appendChild(icon);
                item.appendChild(info);
                item.appendChild(rarityDot);

                item.addEventListener('click', () => {
                    document.querySelectorAll('.weapon-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    activeWeaponId = weapon.weaponId;
                    loadWeaponDetail(weapon, document.getElementById('weaponDetail'));
                });

                container.appendChild(item);
            });

            const activeExists = weapons.some(w => w.weaponId === activeWeaponId);
            if (!activeExists && weapons.length > 0) {
                activeWeaponId = weapons[0].weaponId;
                const firstItem = container.querySelector('.weapon-item');
                if (firstItem) firstItem.classList.add('active');
                loadWeaponDetail(weapons[0], document.getElementById('weaponDetail'));
            } else if (activeExists) {
                const activeWeapon = weapons.find(w => w.weaponId === activeWeaponId);
                if (activeWeapon) {
                    loadWeaponDetail(activeWeapon, document.getElementById('weaponDetail'));
                }
            }
        }

        // ---------- 加载并渲染武器详情 ----------
        async function loadWeaponDetail(weapon, container) {
            container.innerHTML = '<div class="loader">加载武器数据...</div>';
            try {
                const [data, hyperCfg, styleCfg] = await Promise.all([
                    fetch(weapon.contentFile + '?t=' + Date.now()).then(r => r.json()),
                    loadHyperlinkConfig(),
                    loadTextStyleConfig()
                ]);
                container.innerHTML = renderDetail(data, hyperCfg, styleCfg);
            } catch (err) {
                container.innerHTML = `<div class="error-message">加载失败: ${err.message}</div>`;
            }
        }

        // ---------- 渲染详情 ----------
        function renderDetail(data, hyperCfg, styleCfg) {
            // 基础攻击力表格
            const atkRows = [];
            for (let i = 0; i < 90; i++) {
                const level = i + 1;
                const atk = data.baseAtk[i] || '-';
                atkRows.push(`<tr><td>${level}</td><td>${atk}</td></tr>`);
            }

            // 技能列表
            const skillHtml = data.skilllist.map(skill => {
                const blackboard = skill.blackboard;
                const levelCount = 9;
                const rows = [];
                for (let lv = 1; lv <= levelCount; lv++) {
                    const idx = lv - 1;
                    const replaceMap = {};
                    blackboard.forEach(item => {
                        const key = item.key;
                        const arr = item.value;
                        let val = (idx < arr.length) ? arr[idx] : arr[arr.length - 1];
                        replaceMap[key] = val;
                    });

                    let desc = skill.description;
                    // 先替换占位符 {key:format}
                    desc = desc.replace(/\{([^}]+)\}/g, (match, p1) => {
                        const parts = p1.split(':');
                        const expr = parts[0].trim();                // 表达式部分
                        const format = parts[1] ? parts[1].trim() : ''; // 格式部分
                    
                        // 提取表达式中所有变量名（字母数字下划线）
                        const varNames = expr.match(/[a-zA-Z_][a-zA-Z0-9_]*/g) || [];
                        // 检查变量是否都存在
                        const missingVar = varNames.find(name => !(name in replaceMap));
                        if (missingVar) {
                            console.warn(`占位符变量 ${missingVar} 未定义，保留原样`);
                            return match;
                        }
                    
                        // 构建可求值的算术表达式：将变量替换为实际数值
                        let evalExpr = expr;
                        for (const name of varNames) {
                            const value = replaceMap[name];
                            // 使用正则替换整个单词
                            evalExpr = evalExpr.replace(new RegExp(`\\b${name}\\b`, 'g'), value);
                        }
                    
                        // 计算表达式结果
                        let result;
                        try {
                            // 使用 Function 代替 eval（更安全，但本质相同）
                            result = new Function('return ' + evalExpr)();
                        } catch (e) {
                            console.warn('表达式计算失败:', evalExpr, e);
                            return match;
                        }
                    
                        // 根据格式输出
                        if (format.includes('%')) {
                            // 百分比：数值乘以100，保留一位小数
                            return (result * 100).toFixed(1) + '%';
                        } else if (format.includes('0')) {
                            // 取整（例如 {key:0}）
                            return Math.round(result);
                        } else if (format.includes('.')) {
                            // 保留小数位数（如 {key:0.0} 表示一位小数）
                            const precision = format.split('.')[1]?.length || 0;
                            return result.toFixed(precision);
                        } else {
                            // 无格式，直接返回数值
                            return result;
                        }
                    });

                    // 递归解析所有标签（支持嵌套）
                    desc = parseText(desc, hyperCfg, styleCfg);

                    rows.push(`
                        <div class="skill-level-row">
                            <span class="skill-level">Lv.${lv}</span>
                            <span class="skill-desc">${desc}</span>
                        </div>
                    `);
                }

                return `
                    <div class="skill-item">
                        <div class="skill-name">${skill.skillName}</div>
                        <div class="skill-levels">${rows.join('')}</div>
                    </div>
                `;
            }).join('');

            return `
                <div class="detail-header">
                    <div class="detail-left">
                        <div class="detail-icon">
                            <img src="${data.iconbig || data.icon}" onerror="this.src=''">
                        </div>
                        <div class="detail-text">
                            <div class="detail-title-row">
                                <span class="detail-title">${data.title}</span>
                                <span class="detail-rarity rarity-${data.rarity}" title="稀有度 ${data.rarity}"></span>
                            </div>
                            <div class="detail-desc">${data.desc}</div>
                            <div class="detail-deco">${data.decoDesc || ''}</div>
                        </div>
                    </div>
                    <div class="detail-iconfull">
                        <img src="${data.iconfull || ''}" onerror="this.style.display='none'">
                    </div>
                </div>

                <h3>基础攻击力 (1-90级)</h3>
                <div class="atk-table-container">
                    <table class="atk-table">
                        <thead><tr><th>等级</th><th>攻击力</th></tr></thead>
                        <tbody>${atkRows.join('')}</tbody>
                    </table>
                </div>

                <h3>技能数据</h3>
                <div class="skill-list">
                    ${skillHtml}
                </div>

                <div class="weapon-desc">${data.weaponDesc || ''}</div>
            `;
        }

        // ---------- 刷新整个武器模块 ----------
        async function refreshWeaponModule() {
            const weaponList = document.getElementById('weaponList');
            const weaponDetail = document.getElementById('weaponDetail');
            if (!weaponList || !weaponDetail) return;

            const showHidden = getCurrentShowHidden();
            const weapons = await loadWeaponManifest(showHidden);
            currentWeapons = weapons;
            renderWeaponList(weapons, weaponList);
        }

        // ---------- 超链接点击处理 ----------
        function setupHyperlinkTooltip() {
            const tooltip = document.getElementById('hyperlink-tooltip');
            if (!tooltip) return;

            document.addEventListener('click', (e) => {
                const target = e.target.closest('.tag-hyperlink');
                if (!target) {
                    tooltip.style.display = 'none';
                    return;
                }
                e.preventDefault();
                const tagId = target.dataset.tagId;
                if (!tagId) return;
                const hyperDef = hyperlinkConfig?.[tagId];
                if (!hyperDef) return;

                const name = hyperDef.name || '';
                let desc = hyperDef.desc || '';
                desc = parseText(desc, hyperlinkConfig, textstyleConfig);

                let iconHtml = '';
                if (hyperDef.iconPath) {
                    const iconFullPath = hyperDef.iconPath.includes('.') ? hyperDef.iconPath : hyperDef.iconPath + '.png';
                    iconHtml = `<img src="/${iconFullPath}" style="width: 1.2em; height: 1.2em; vertical-align: middle; margin-right: 4px;">`;
                }

                tooltip.innerHTML = `
                    <div class="tooltip-name">${iconHtml}${name}</div>
                    <div class="tooltip-desc">${desc}</div>
                `;

                const rect = target.getBoundingClientRect();
                const scrollX = window.scrollX || window.pageXOffset;
                const scrollY = window.scrollY || window.pageYOffset;
                tooltip.style.left = (rect.left + scrollX) + 'px';
                tooltip.style.top = (rect.bottom + scrollY + 5) + 'px';
                tooltip.style.display = 'block';
            });

            tooltip.addEventListener('click', (e) => e.stopPropagation());
        }

        // ---------- 初始化 ----------
        async function initWeaponModule() {
            if (isInitialized) return;
            isInitialized = true;

            await Promise.all([loadTextStyleConfig(), loadHyperlinkConfig()]);
            setupHyperlinkTooltip();
            window.addEventListener('globalConfigChanged', async () => {
                await refreshWeaponModule();
            });
            await refreshWeaponModule();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initWeaponModule);
        } else {
            initWeaponModule();
        }
    })();
</script>
