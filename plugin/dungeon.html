<!-- plugin/dungeon.html -->
<link rel="stylesheet" href="/theme/dungeon.css">

<div class="dungeon-module">
    <div class="left-column">
        <div class="list-search">
            <input type="text" id="dungeonSearchInput" placeholder="搜索副本系列 (名称/ID)" class="search-input">
        </div>
        <div class="dungeon-series-list" id="dungeonSeriesList"></div>
    </div>
    <div class="dungeon-detail" id="dungeonDetail">
        <div class="loader">加载副本数据...</div>
    </div>
    <div class="mobile-list-btn" id="dungeonMobileListBtn">📋 列表</div>
    <div id="dungeonMobileListOverlay" class="mobile-list-overlay">
        <div class="mobile-list-container">
            <div class="mobile-list-header">选择副本系列</div>
            <div class="mobile-list-content" id="dungeonMobileListContent"></div>
        </div>
    </div>
</div>
<script>
    (function() {
        let allSeries = [];
        let activeSeriesId = null;
        let isInitialized = false;
        let searchTerm = '';

        const IMAGE_BASE_PATH = '/public/images/';

        function getCurrentShowHidden() {
            return window.akeData?.getConfig().showHidden ?? false;
        }

        function parseText(text) {
            return window.parseText(text, IMAGE_BASE_PATH);
        }

        function formatValue(val) {
            if (typeof val !== 'number') return val;
            if (Math.abs(val) < 1 && val !== 0) {
                return (val * 100).toFixed(1) + '%';
            }
            return val.toFixed(1);
        }

        function filterSeriesBySearch(series) {
            if (!searchTerm) return series;
            const term = searchTerm.toLowerCase();
            return series.filter(s => 
                (s.name && s.name.toLowerCase().includes(term)) || 
                (s.templateId && s.templateId.toLowerCase().includes(term))
            );
        }

        const mobileBtn = document.getElementById('dungeonMobileListBtn');
        const mobileOverlay = document.getElementById('dungeonMobileListOverlay');
        const mobileContent = document.getElementById('dungeonMobileListContent');

        function buildMobileList() {
            const filtered = filterSeriesBySearch(allSeries);
            mobileContent.innerHTML = '';
            filtered.forEach(series => {
                const item = document.createElement('div');
                item.className = 'mobile-list-item';
                if (series.templateId === activeSeriesId) item.classList.add('active');
                item.innerHTML = `
                    <div class="item-name">${series.name}</div>
                    <div class="item-id">${series.templateId}</div>
                `;
                item.addEventListener('click', () => {
                    activeSeriesId = series.templateId;
                    loadSeriesDetail(series, document.getElementById('dungeonDetail'));
                    closeMobileList();
                });
                mobileContent.appendChild(item);
            });
        }

        function openMobileList() {
            buildMobileList();
            mobileOverlay.style.display = 'flex';
        }

        function closeMobileList() {
            mobileOverlay.style.display = 'none';
        }

        async function loadSeriesManifest(showHidden) {
            try {
                const res = await fetch('/public/CH/dungeon/manifest.json?t=' + Date.now());
                if (!res.ok) throw new Error('无法加载副本系列清单');
                const all = await res.json();
                let series = showHidden ? all : all.filter(s => !s.hidden);
                series.sort((a, b) => (a.priority || 999) - (b.priority || 999));
                return series;
            } catch (err) {
                console.error('加载副本系列清单失败:', err);
                return [];
            }
        }

        function renderSeriesList() {
            const container = document.getElementById('dungeonSeriesList');
            const detailContainer = document.getElementById('dungeonDetail');
            if (!container) return;

            const filtered = filterSeriesBySearch(allSeries);

            container.innerHTML = '';
            if (filtered.length === 0) {
                container.innerHTML = '<div class="loader">无匹配系列</div>';
                if (detailContainer) detailContainer.innerHTML = '<div class="loader">请选择系列</div>';
                activeSeriesId = null;
                return;
            }

            filtered.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `series-item ${item.templateId === activeSeriesId ? 'active' : (index === 0 && !activeSeriesId ? 'active' : '')}`;
                div.dataset.seriesId = item.templateId;
                div.dataset.contentFile = item.contentFile;

                const rarityBar = document.createElement('span');
                rarityBar.className = `rarity-bar rarity-${item.rarity || 5}`;
                rarityBar.title = `稀有度 ${item.rarity || 5}`;

                const infoDiv = document.createElement('div');
                infoDiv.className = 'series-info';

                const nameSpan = document.createElement('div');
                nameSpan.className = 'series-name';
                nameSpan.textContent = item.name;

                const idSpan = document.createElement('div');
                idSpan.className = 'series-id';
                idSpan.textContent = item.templateId;

                infoDiv.appendChild(nameSpan);
                infoDiv.appendChild(idSpan);

                div.appendChild(rarityBar);
                div.appendChild(infoDiv);

                div.addEventListener('click', () => {
                    document.querySelectorAll('.series-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    activeSeriesId = item.templateId;
                    loadSeriesDetail(item, detailContainer);
                });

                container.appendChild(div);
            });

            const activeExists = filtered.some(s => s.templateId === activeSeriesId);
            if (!activeExists && filtered.length > 0) {
                activeSeriesId = filtered[0].templateId;
                const firstItem = container.querySelector('.series-item');
                if (firstItem) firstItem.classList.add('active');
                loadSeriesDetail(filtered[0], detailContainer);
            } else if (activeExists) {
                const activeItem = filtered.find(s => s.templateId === activeSeriesId);
                if (activeItem) {
                    const activeDiv = container.querySelector(`.series-item[data-series-id="${activeSeriesId}"]`);
                    if (activeDiv) activeDiv.classList.add('active');
                    loadSeriesDetail(activeItem, detailContainer);
                }
            }
        }

        async function loadSeriesDetail(seriesItem, container) {
            container.innerHTML = '<div class="loader">加载副本数据...</div>';
            try {
                const data = await fetch(seriesItem.contentFile + '?t=' + Date.now()).then(r => r.json());
                container.innerHTML = renderDetail(data, seriesItem);
            } catch (err) {
                container.innerHTML = `<div class="error-message">加载失败: ${err.message}</div>`;
            }
        }

        function renderRewards(rewards) {
            if (!rewards || Object.keys(rewards).length === 0) return '无';
            return Object.entries(rewards).map(([name, count]) => `${name} x${count}`).join('<br>');
        }

        function renderEnemyValues(valueObj) {
            const excluded = ['enemyId', 'enemyName', 'iconbig', 'attrModifiers'];
            const entries = Object.entries(valueObj).filter(([key]) => !excluded.includes(key));
            if (entries.length === 0) return '';
                
            let html = '<div class="enemy-value-grid">';
            entries.forEach(([key, val]) => {
                const formatted = formatValue(val);
                html += `
                    <div class="value-item">
                        <span class="value-key">${key}</span>
                        <span class="value-val">${formatted}</span>
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }

        function renderDungeonCard(dungeonId, dungeon) {
            const name = dungeon.name || dungeonId;
            const level = dungeon.level || '';
            const desc = parseText(dungeon.desc || '');
            const featureDesc = dungeon.featureDesc ? parseText(dungeon.featureDesc) : '';
            const costStamina = dungeon.costStamina !== undefined ? dungeon.costStamina : 0;
            const recommendLevel = dungeon.推荐挑战等级 || '?';
            const fixedRewards = renderRewards(dungeon.固定奖励);
            const firstRewards = renderRewards(dungeon.首通奖励);
        
            let enemiesHtml = '';
            if (dungeon.enemy && dungeon.enemy.length > 0) {
                enemiesHtml = '<h4 class="enemies-title">敌人详情</h4><div class="enemy-list">';
                dungeon.enemy.forEach((enemy, idx) => {
                    const enemyName = enemy.enemyName || enemy.enemyId;
                    const enemyLevel = enemy.level || '?';
                    const attrModifiers = enemy.attrModifiers ? `<div class="attr-modifiers">${enemy.attrModifiers}</div>` : '';
                    const valueTable = renderEnemyValues(enemy.value || {});
                    const iconSrc = enemy.iconbig || '';
                    enemiesHtml += `
                        <div class="enemy-card">
                            <div class="enemy-header">
                                <img class="enemy-icon" src="${iconSrc}" onerror="this.onerror=null; this.src='';">
                                <div class="enemy-title">
                                    <span class="enemy-name">${enemyName}</span>
                                    <span class="enemy-level">Lv.${enemyLevel}</span>
                                </div>
                            </div>
                            ${attrModifiers}
                            <div class="enemy-values">${valueTable}</div>
                        </div>
                    `;
                });
                enemiesHtml += '</div>';
            }
        
            return `
                <div class="dungeon-card">
                    <div class="dungeon-header">
                        <h4 class="dungeon-name">${name}</h4>
                        <span class="dungeon-level">${level}</span>
                    </div>
                    <div class="dungeon-desc">${desc}</div>
                    ${featureDesc ? `<div class="dungeon-feature">${featureDesc}</div>` : ''}
                    <div class="dungeon-meta">
                        <div><span class="meta-label">消耗理智</span> ${costStamina}</div>
                        <div><span class="meta-label">推荐等级</span> ${recommendLevel}</div>
                    </div>
                    <div class="dungeon-rewards">
                        <div class="rewards-block">
                            <span class="rewards-title">固定奖励</span>
                            <div class="rewards-content">${fixedRewards}</div>
                        </div>
                        <div class="rewards-block">
                            <span class="rewards-title">首通奖励</span>
                            <div class="rewards-content">${firstRewards}</div>
                        </div>
                    </div>
                    ${enemiesHtml}
                </div>
            `;
        }

        function renderDetail(data, seriesItem) {
            const seriesName = data.dungeonSeriesname || seriesItem.name;
            const dungeons = data.dungeons || {};
            const dungeonIds = Object.keys(dungeons);
            if (dungeonIds.length === 0) {
                return `<div class="error-message">该系列下没有副本数据</div>`;
            }

            let dungeonsHtml = '';
            dungeonIds.forEach(id => {
                dungeonsHtml += renderDungeonCard(id, dungeons[id]);
            });

            return `
                <div class="dungeon-series-header">
                    <h2 class="series-title">${seriesName}</h2>
                    <span class="series-id">${data.dungeonSeriesId || seriesItem.templateId}</span>
                </div>
                <div class="dungeons-container">
                    ${dungeonsHtml}
                </div>
            `;
        }

        async function refreshModule() {
            const list = document.getElementById('dungeonSeriesList');
            const detail = document.getElementById('dungeonDetail');
            if (!list || !detail) return;

            const showHidden = getCurrentShowHidden();
            const series = await loadSeriesManifest(showHidden);
            allSeries = series;
            renderSeriesList();
        }

        async function initModule() {
            if (isInitialized) return;
            isInitialized = true;
            if (window.configLoaded) await window.configLoaded;

            if (mobileBtn) mobileBtn.addEventListener('click', openMobileList);
            if (mobileOverlay) mobileOverlay.addEventListener('click', (e) => {
                if (e.target === mobileOverlay) closeMobileList();
            });

            window.addEventListener('globalConfigChanged', (e) => {
                searchTerm = '';
                const searchInput = document.getElementById('dungeonSearchInput');
                if (searchInput) searchInput.value = '';
                refreshModule();
            });

            document.getElementById('dungeonSearchInput')?.addEventListener('input', (e) => {
                searchTerm = e.target.value;
                renderSeriesList();
            });

            await refreshModule();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initModule);
        } else {
            initModule();
        }
    })();
</script>
