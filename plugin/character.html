<!-- plugin/character.html -->
<link rel="stylesheet" href="/theme/character.css">

<div class="character-module">
    <div class="character-list" id="characterList"></div>
    <div class="character-detail" id="characterDetail">
        <div class="loader">加载干员数据...</div>
    </div>
</div>

<!-- 超链接浮窗容器 -->
<div id="hyperlink-tooltip" class="hyperlink-tooltip"></div>

<script>
    (function() {
        // ---------- 模块内部状态 ----------
        let currentCharacters = [];
        let activeCharId = null;
        let isInitialized = false;
        let textstyleConfig = null;
        let hyperlinkConfig = null;
        let textstylePromise = null;
        let hyperlinkPromise = null;

        const IMAGE_BASE_PATH = '/public/images/bufficon/';

        // ---------- 辅助函数 ----------
        function getCurrentShowHidden() {
            return window.akeData?.getConfig().showHidden ?? false;
        }

        async function loadTextStyleConfig() {
            if (textstyleConfig) return textstyleConfig;
            if (textstylePromise) return textstylePromise;
            textstylePromise = (async () => {
                try {
                    const res = await fetch('/theme/textstyle.json?t=' + Date.now());
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    textstyleConfig = await res.json();
                    return textstyleConfig;
                } catch (err) {
                    console.warn('加载 textstyle.json 失败', err);
                    textstyleConfig = {};
                    return textstyleConfig;
                } finally {
                    textstylePromise = null;
                }
            })();
            return textstylePromise;
        }

        async function loadHyperlinkConfig() {
            if (hyperlinkConfig) return hyperlinkConfig;
            if (hyperlinkPromise) return hyperlinkPromise;
            hyperlinkPromise = (async () => {
                try {
                    const res = await fetch('/theme/hyperlink.json?t=' + Date.now());
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    hyperlinkConfig = await res.json();
                    return hyperlinkConfig;
                } catch (err) {
                    console.warn('加载 hyperlink.json 失败', err);
                    hyperlinkConfig = {};
                    return hyperlinkConfig;
                } finally {
                    hyperlinkPromise = null;
                }
            })();
            return hyperlinkPromise;
        }

        // ---------- 递归解析文本（支持嵌套标签）----------
        function parseText(text, hyperlinkCfg, textstyleCfg) {
            if (!text) return '';
            let result = '';
            let i = 0;
            const len = text.length;

            while (i < len) {
                if (text[i] === '<') {
                    if (text.substr(i, 6) === '<image') {
                        const endIdx = text.indexOf('>', i);
                        if (endIdx === -1) { result += text[i]; i++; continue; }
                        const tagContent = text.substring(i + 1, endIdx);
                        const imgMatch = tagContent.match(/image="([^"]+)"\s*scale=([0-9.]+)/);
                        if (imgMatch) {
                            let path = imgMatch[1];
                            const scale = imgMatch[2];
                            if (!path.includes('.')) path += '.png';
                            result += `<img src="${IMAGE_BASE_PATH}${path}" style="transform: scale(${scale}); width: auto; height: 1em; display: inline-block; vertical-align: middle;" class="inline-icon">`;
                        }
                        i = endIdx + 1;
                        continue;
                    }
                    else if (text[i+1] === '@' || text[i+1] === '#') {
                        const prefix = text[i+1];
                        const tagNameEnd = text.indexOf('>', i);
                        if (tagNameEnd === -1) { result += text[i]; i++; continue; }
                        const tagName = text.substring(i+2, tagNameEnd);

                        let depth = 1;
                        let pos = tagNameEnd + 1;
                        while (pos < len) {
                            if (text[pos] === '<') {
                                if (text.substr(pos, 3) === '</>') {
                                    depth--;
                                    if (depth === 0) {
                                        const innerContent = text.substring(tagNameEnd + 1, pos);
                                        const renderedInner = parseText(innerContent, hyperlinkCfg, textstyleCfg);

                                        let tagResult = '';
                                        if (prefix === '@') {
                                            const styleDef = textstyleCfg?.[tagName];
                                            if (!styleDef) {
                                                tagResult = tagName.includes('info') ? `<span style="color: #999999;">${renderedInner}</span>` : renderedInner;
                                            } else {
                                                const color = styleDef.color?.[0] || null;
                                                const image = styleDef.image?.[0] || null;
                                                const scale = styleDef.scale?.[0] || 1;
                                                if (image) {
                                                    tagResult = `<span class="textstyle-icon-text"><img src="/${image}" style="transform: scale(${scale});" alt=""><span style="${color ? `color: ${color};` : ''}">${renderedInner}</span></span>`;
                                                } else {
                                                    tagResult = color ? `<span style="color: ${color};">${renderedInner}</span>` : renderedInner;
                                                }
                                            }
                                        } else { // prefix === '#'
                                            const hyperDef = hyperlinkCfg?.[tagName];
                                            if (hyperDef) {
                                                const styleid = hyperDef.styleid;
                                                if (styleid && textstyleCfg?.[styleid]) {
                                                    const styleDef = textstyleCfg[styleid];
                                                    const color = styleDef.color?.[0] || null;
                                                    const image = styleDef.image?.[0] || null;
                                                    const scale = styleDef.scale?.[0] || 1;
                                                    if (image) {
                                                        tagResult = `<span class="textstyle-icon-text"><img src="/${image}" style="transform: scale(${scale});" alt=""><span class="tag-hyperlink" data-tag-id="${tagName}" style="${color ? `color: ${color};` : ''}">${renderedInner}</span></span>`;
                                                    } else if (color) {
                                                        tagResult = `<span class="tag-hyperlink" data-tag-id="${tagName}" style="color: ${color};">${renderedInner}</span>`;
                                                    } else {
                                                        tagResult = `<span class="tag-hyperlink" data-tag-id="${tagName}">${renderedInner}</span>`;
                                                    }
                                                } else {
                                                    tagResult = `<span class="tag-hyperlink" data-tag-id="${tagName}">${renderedInner}</span>`;
                                                }
                                            } else {
                                                tagResult = renderedInner;
                                            }
                                        }
                                        result += tagResult;
                                        i = pos + 3;
                                        break;
                                    }
                                    pos += 3;
                                } else if (text[pos+1] === '@' || text[pos+1] === '#' || text.substr(pos, 6) === '<image') {
                                    depth++;
                                    pos++;
                                } else {
                                    pos++;
                                }
                            } else {
                                pos++;
                            }
                        }
                        if (pos >= len) {
                            result += text.substring(i, tagNameEnd + 1);
                            i = tagNameEnd + 1;
                        }
                        continue;
                    } else {
                        result += text[i];
                        i++;
                    }
                } else {
                    result += text[i];
                    i++;
                }
            }
            return result;
        }

        // 替换描述中的占位符 {表达式:格式}，支持加减乘除运算
        function replacePlaceholders(desc, valueMap) {
            return desc.replace(/\{([^}]+)\}/g, (match, p1) => {
                const parts = p1.split(':');
                const expr = parts[0].replace(/\s+/g, ''); // 去除空格
                const format = parts[1] ? parts[1].trim() : '';
            
                // 提取表达式中的所有变量名
                const varNames = expr.match(/[a-zA-Z_][a-zA-Z0-9_]*/g) || [];
                // 检查变量是否都存在
                const missingVar = varNames.find(name => !(name in valueMap));
                if (missingVar) {
                    console.warn(`占位符变量 ${missingVar} 未定义，保留原样`);
                    return match;
                }
            
                // 构建可求值的算术表达式：将变量替换为数值（确保为数字）
                let evalExpr = expr;
                for (const name of varNames) {
                    const val = Number(valueMap[name]); // 强制转为数字
                    // 使用正则替换整个单词
                    evalExpr = evalExpr.replace(new RegExp(`\\b${name}\\b`, 'g'), val);
                }
            
                // 计算表达式结果
                let result;
                try {
                    result = new Function('return ' + evalExpr)();
                } catch (e) {
                    console.warn('表达式计算失败:', evalExpr, e);
                    return match;
                }
            
                // 根据格式输出
                if (format.includes('%')) {
                    // 百分比：数值乘以100，保留一位小数
                    return (result * 100).toFixed(1) + '%';
                } else if (format.includes('.')) {
                    // 保留小数位数（如 {key:0.0} 表示一位小数）
                    const precision = format.split('.')[1]?.length || 1;
                    return result.toFixed(precision);
                } else if (format.includes('0')) {
                    // 取整（例如 {key:0}）
                    return Math.round(result);
                } else {
                    // 无格式，直接返回数值（保留两位小数以便阅读）
                    return result.toFixed(2);
                }
            });
        }

        // ---------- 加载角色清单 ----------
        async function loadCharacterManifest(showHidden) {
            try {
                const res = await fetch('/public/CH/character/manifest.json?t=' + Date.now());
                if (!res.ok) throw new Error('无法加载角色清单');
                const allChars = await res.json();
                let chars = showHidden ? allChars : allChars.filter(c => !c.hidden);
                chars.sort((a, b) => (a.priority || 999) - (b.priority || 999));
                return chars;
            } catch (err) {
                console.error('加载角色清单失败:', err);
                return [];
            }
        }

        // ---------- 渲染左侧角色列表 ----------
        function renderCharacterList(characters, container) {
            container.innerHTML = '';
            if (characters.length === 0) {
                container.innerHTML = '<div class="loader">暂无干员</div>';
                return;
            }

            characters.forEach((char, index) => {
                const item = document.createElement('div');
                item.className = `character-item ${char.charId === activeCharId ? 'active' : (index === 0 && !activeCharId ? 'active' : '')}`;
                item.dataset.charId = char.charId;
                item.dataset.contentFile = char.contentFile;

                const icon = document.createElement('img');
                icon.className = 'character-icon';
                icon.src = char.icon || '';
                icon.onerror = () => icon.src = '';

                const info = document.createElement('div');
                info.className = 'character-info';

                const name = document.createElement('span');
                name.className = 'character-name';
                name.textContent = char.name;

                const rarityDot = document.createElement('span');
                rarityDot.className = `rarity-dot rarity-${char.rarity}`;
                rarityDot.title = `稀有度 ${char.rarity}`;

                info.appendChild(name);
                item.appendChild(icon);
                item.appendChild(info);
                item.appendChild(rarityDot);

                item.addEventListener('click', () => {
                    document.querySelectorAll('.character-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    activeCharId = char.charId;
                    loadCharacterDetail(char, document.getElementById('characterDetail'));
                });

                container.appendChild(item);
            });

            const activeExists = characters.some(c => c.charId === activeCharId);
            if (!activeExists && characters.length > 0) {
                activeCharId = characters[0].charId;
                const firstItem = container.querySelector('.character-item');
                if (firstItem) firstItem.classList.add('active');
                loadCharacterDetail(characters[0], document.getElementById('characterDetail'));
            } else if (activeExists) {
                const activeChar = characters.find(c => c.charId === activeCharId);
                if (activeChar) {
                    loadCharacterDetail(activeChar, document.getElementById('characterDetail'));
                }
            }
        }

        // ---------- 加载角色详情 ----------
        async function loadCharacterDetail(character, container) {
            container.innerHTML = '<div class="loader">加载干员数据...</div>';
            try {
                const [data, hyperCfg, styleCfg] = await Promise.all([
                    fetch(character.contentFile + '?t=' + Date.now()).then(r => r.json()),
                    loadHyperlinkConfig(),
                    loadTextStyleConfig()
                ]);
                container.innerHTML = renderDetail(data, hyperCfg, styleCfg);
            } catch (err) {
                container.innerHTML = `<div class="error-message">加载失败: ${err.message}</div>`;
            }
        }

        // ---------- 渲染详情 ----------
        function renderDetail(data, hyperCfg, styleCfg) {
            // 基础信息
            const basicHtml = `
                <div class="detail-header">
                    <div class="detail-icon">
                        <img src="${data.icon || ''}" onerror="this.src=''">
                    </div>
                    <div class="detail-text">
                        <div class="detail-title-row">
                            <span class="detail-name">${data.name}</span>
                            <span class="detail-rarity rarity-${data.rarity}" title="稀有度 ${data.rarity}"></span>
                        </div>
                        <div class="detail-tags">
                            ${(data.charBattleTag || []).map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                        <div class="detail-meta">
                            <div><span class="meta-label">职业</span> ${data.profession || '-'}</div>
                            <div><span class="meta-label">武器类型</span> ${data.weapontype || '-'}</div>
                            <div><span class="meta-label">主属性</span> ${data.mainAttrType || '-'}</div>
                            <div><span class="meta-label">副属性</span> ${data.subAttrType || '-'}</div>
                            <div><span class="meta-label">CV</span> ${(data.cvName || []).join(' / ')}</div>
                        </div>
                        <div class="detail-profile">${parseText(data.profile || '', hyperCfg, styleCfg)}</div>
                        <div class="detail-feature">${parseText(data.feature || '', hyperCfg, styleCfg)}</div>
                    </div>
                </div>
            `;

            // 属性成长：汇总为一张表格，每列一个属性
            const growth = data.growth || {};
            const attributes = ['力量', '敏捷', '智识', '意志', '生命值', '攻击力', '法术等级系数', '物理等级系数'];
            const firstAttr = attributes.find(attr => growth[attr] && growth[attr].length);
            const levelCount = firstAttr ? growth[firstAttr].length : 0;
            const growthRows = [];
            for (let lv = 1; lv <= levelCount; lv++) {
                const cells = attributes.map(attr => {
                    const val = growth[attr]?.[lv-1];
                    return `<td>${val !== undefined ? val.toFixed(2) : '-'}</td>`;
                }).join('');
                growthRows.push(`<tr><td>${lv}</td>${cells}</tr>`);
            }
            const growthHtml = `
                <div class="section">
                    <h3>属性成长</h3>
                    <div class="growth-table-container">
                        <table class="growth-table">
                            <thead>
                                <tr>
                                    <th>等级</th>
                                    ${attributes.map(attr => `<th>${attr}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>${growthRows.join('')}</tbody>
                        </table>
                    </div>
                </div>
            `;

            // 天赋
            const talentsHtml = (data.talents || []).map(talent => {
                const valueMap = talent.values || {};
                let desc = replacePlaceholders(talent.description, valueMap);
                desc = parseText(desc, hyperCfg, styleCfg);
                return `
                    <div class="talent-item">
                        <div class="talent-name">${talent.name}</div>
                        <div class="talent-desc">${desc}</div>
                    </div>
                `;
            }).join('');

            // 潜能
            const potentialsHtml = (data.potentials || []).map(pot => {
                const valueMap = pot.values || {};
                let desc = replacePlaceholders(pot.description, valueMap);
                desc = parseText(desc, hyperCfg, styleCfg);
                return `
                    <div class="potential-item">
                        <div class="potential-name">${pot.name}</div>
                        <div class="potential-desc">${desc}</div>
                    </div>
                `;
            }).join('');

            // 属性节点（四项并排）
            const attrNodes = data.attributeNodes || [];
            const attrNodesHtml = `
                <div class="section">
                    <h3>属性节点</h3>
                    <div class="attr-nodes-grid">
                        ${attrNodes.map(node => `
                            <div class="attr-node-item">
                                <div class="attr-node-title">${node.title}</div>
                                <div class="attr-node-desc">${node.description}</div>
                                <div class="attr-node-modifier">${node.modifier}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            // 技能大类
            const skillsGroups = data.skills || [];
            const skillsHtml = skillsGroups.map(group => {
                const groupDesc = parseText(group.description, hyperCfg, styleCfg);
                const skillDetails = (group.skillIds || [])
                    .map(id => data.skill?.[id])
                    .filter(Boolean);
                const skillTables = skillDetails.map(detail => {
                    const values = detail.values || {};
                    const columns = Object.keys(values);
                    if (columns.length === 0) return '';
                    const firstKey = columns.find(k => Array.isArray(values[k]));
                    const levelCount = firstKey ? values[firstKey].length : 0;
                    const rows = [];
                    for (let lv = 1; lv <= levelCount; lv++) {
                        const cells = columns.map(col => {
                            const arr = values[col];
                            if (!Array.isArray(arr)) return '<td>-</td>';
                            let val = arr[lv-1] !== undefined ? arr[lv-1] : arr[arr.length-1];
                            if (typeof val === 'number' && !col.includes('%')) {
                                val = val.toFixed(2);
                            }
                            return `<td>${val}</td>`;
                        }).join('');
                        rows.push(`<tr><td>Lv.${lv}</td>${cells}</tr>`);
                    }
                    const header = `<tr><th>等级</th>${columns.map(col => `<th>${col}</th>`).join('')}</tr>`;
                    return `
                        <div class="skill-detail">
                            <table class="skill-table">
                                <thead>${header}</thead>
                                <tbody>${rows.join('')}</tbody>
                            </table>
                        </div>
                    `;
                }).join('');
                return `
                    <div class="skill-item">
                        <div class="skill-name">${group.name}</div>
                        <div class="skill-desc">${groupDesc}</div>
                        <div class="skill-details">${skillTables}</div>
                    </div>
                `;
            }).join('');

            // 档案
            const profileRecordsHtml = (data.profileRecord || []).map(rec => `
                <div class="profile-record">
                    <div class="profile-title">${rec.title}</div>
                    <div class="profile-desc">${parseText(rec.desc, hyperCfg, styleCfg)}</div>
                </div>
            `).join('');

            // 语音记录（与档案相同样式）
            const voiceHtml = (data.profileVoice || []).map(v => `
                <div class="voice-record">
                    <div class="voice-title">${v.title}</div>
                    <div class="voice-desc">${v.desc}</div>
                </div>
            `).join('');

            return `
                ${basicHtml}
                ${growthHtml}
                <div class="section">
                    <h3>天赋</h3>
                    ${talentsHtml || '<p>无</p>'}
                </div>
                <div class="section">
                    <h3>潜能</h3>
                    ${potentialsHtml || '<p>无</p>'}
                </div>
                ${attrNodesHtml}
                <div class="section">
                    <h3>技能</h3>
                    ${skillsHtml || '<p>无</p>'}
                </div>
                <div class="section">
                    <h3>档案</h3>
                    ${profileRecordsHtml || '<p>无</p>'}
                </div>
                <div class="section">
                    <h3>语音记录</h3>
                    ${voiceHtml || '<p>无</p>'}
                </div>
            `;
        }

        // ---------- 刷新整个模块 ----------
        async function refreshModule() {
            const list = document.getElementById('characterList');
            const detail = document.getElementById('characterDetail');
            if (!list || !detail) return;

            const showHidden = getCurrentShowHidden();
            const chars = await loadCharacterManifest(showHidden);
            currentCharacters = chars;
            renderCharacterList(chars, list);
        }

        // ---------- 超链接点击处理 ----------
        function setupHyperlinkTooltip() {
            const tooltip = document.getElementById('hyperlink-tooltip');
            if (!tooltip) return;

            document.addEventListener('click', (e) => {
                const target = e.target.closest('.tag-hyperlink');
                if (!target) {
                    tooltip.style.display = 'none';
                    return;
                }
                e.preventDefault();
                const tagId = target.dataset.tagId;
                if (!tagId) return;
                const hyperDef = hyperlinkConfig?.[tagId];
                if (!hyperDef) return;

                const name = hyperDef.name || '';
                let desc = hyperDef.desc || '';
                desc = parseText(desc, hyperlinkConfig, textstyleConfig);

                let iconHtml = '';
                if (hyperDef.iconPath) {
                    const iconFullPath = hyperDef.iconPath.includes('.') ? hyperDef.iconPath : hyperDef.iconPath + '.png';
                    iconHtml = `<img src="/${iconFullPath}" style="width: 1.2em; height: 1.2em; vertical-align: middle; margin-right: 4px;">`;
                }

                tooltip.innerHTML = `
                    <div class="tooltip-name">${iconHtml}${name}</div>
                    <div class="tooltip-desc">${desc}</div>
                `;

                const rect = target.getBoundingClientRect();
                const scrollX = window.scrollX || window.pageXOffset;
                const scrollY = window.scrollY || window.pageYOffset;
                tooltip.style.left = (rect.left + scrollX) + 'px';
                tooltip.style.top = (rect.bottom + scrollY + 5) + 'px';
                tooltip.style.display = 'block';
            });

            tooltip.addEventListener('click', (e) => e.stopPropagation());
        }

        // ---------- 初始化 ----------
        async function initModule() {
            if (isInitialized) return;
            isInitialized = true;

            await Promise.all([loadTextStyleConfig(), loadHyperlinkConfig()]);
            setupHyperlinkTooltip();
            window.addEventListener('globalConfigChanged', refreshModule);
            await refreshModule();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initModule);
        } else {
            initModule();
        }
    })();
</script>
