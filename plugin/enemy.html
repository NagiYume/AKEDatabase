<!-- plugin/enemy.html -->
<link rel="stylesheet" href="/theme/enemy.css">

<div class="enemy-module">
    <div class="left-column">
        <div class="list-search">
            <input type="text" id="enemySearchInput" placeholder="搜索敌人 (名称/ID)" class="search-input">
        </div>
        <div class="enemy-list" id="enemyList"></div>
    </div>
    <div class="enemy-detail" id="enemyDetail">
        <div class="loader">加载敌人数据...</div>
    </div>
    <div class="mobile-list-btn" id="enemyMobileListBtn">📋 列表</div>
    <div id="enemyMobileListOverlay" class="mobile-list-overlay">
        <div class="mobile-list-container">
            <div class="mobile-list-header">选择敌人</div>
            <div class="mobile-list-content" id="enemyMobileListContent"></div>
        </div>
    </div>
</div>

<script>
    (function() {
        let allEnemies = [];
        let activeEnemyId = null;
        let isInitialized = false;
        let enemyLevelsToShow = null;
        let variantExpandStates = {}; // 每个变种的独立展开状态 { index: boolean }
        let searchTerm = '';
        let currentEnemy = null;
        let currentEnemyData = null;

        const IMAGE_BASE_PATH = '/public/images/';

        function getCurrentShowHidden() {
            return window.akeData?.getConfig().showHidden ?? false;
        }

        function parseText(text) {
            return window.parseText(text, IMAGE_BASE_PATH);
        }

        function parseLevelInput(input, maxLevel = 100) {
            if (!input || input.trim() === '') return [];
            const parts = input.split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n) && n >= 1 && n <= maxLevel);
            return parts.length ? parts : [maxLevel];
        }

        function filterEnemiesBySearch(enemies) {
            if (!searchTerm) return enemies;
            const term = searchTerm.toLowerCase();
            return enemies.filter(e => 
                (e.name && e.name.toLowerCase().includes(term)) || 
                (e.templateId && e.templateId.toLowerCase().includes(term))
            );
        }

        async function loadEnemyManifest(showHidden) {
            try {
                const res = await fetch('/public/CH/enemy/manifest.json?t=' + Date.now());
                if (!res.ok) throw new Error('无法加载敌人清单');
                const all = await res.json();
                let enemies = showHidden ? all : all.filter(e => !e.hidden);
                enemies.sort((a, b) => (a.priority || 999) - (b.priority || 999));
                return enemies;
            } catch (err) {
                console.error('加载敌人清单失败:', err);
                return [];
            }
        }

        function renderEnemyList() {
            const container = document.getElementById('enemyList');
            const detailContainer = document.getElementById('enemyDetail');
            if (!container) return;

            const filtered = filterEnemiesBySearch(allEnemies);

            container.innerHTML = '';
            if (filtered.length === 0) {
                container.innerHTML = '<div class="loader">无匹配敌人</div>';
                if (detailContainer) detailContainer.innerHTML = '<div class="loader">请选择敌人</div>';
                activeEnemyId = null;
                return;
            }

            filtered.forEach((enemy, index) => {
                const item = document.createElement('div');
                item.className = `enemy-item ${enemy.templateId === activeEnemyId ? 'active' : (index === 0 && !activeEnemyId ? 'active' : '')}`;
                item.dataset.enemyId = enemy.templateId;
                item.dataset.contentFile = enemy.contentFile;

                const rarityBar = document.createElement('span');
                rarityBar.className = `rarity-bar rarity-${enemy.rarity}`;
                rarityBar.title = `稀有度 ${enemy.rarity}`;

                const icon = document.createElement('img');
                icon.className = 'enemy-icon';
                icon.src = enemy.icon || '';
                icon.onerror = function() { this.onerror = null; this.src = ''; };

                const textContainer = document.createElement('div');
                textContainer.className = 'enemy-info';
                const nameDiv = document.createElement('div');
                nameDiv.className = 'enemy-name';
                nameDiv.textContent = enemy.name;
                const idDiv = document.createElement('div');
                idDiv.className = 'enemy-id';
                idDiv.textContent = enemy.templateId;
                textContainer.appendChild(nameDiv);
                textContainer.appendChild(idDiv);

                item.appendChild(rarityBar);
                item.appendChild(icon);
                item.appendChild(textContainer);

                item.addEventListener('click', () => {
                    document.querySelectorAll('.enemy-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    activeEnemyId = enemy.templateId;
                    loadEnemyDetail(enemy, detailContainer);
                });

                container.appendChild(item);
            });

            const activeExists = filtered.some(e => e.templateId === activeEnemyId);
            if (!activeExists && filtered.length > 0) {
                activeEnemyId = filtered[0].templateId;
                const firstItem = container.querySelector('.enemy-item');
                if (firstItem) firstItem.classList.add('active');
                loadEnemyDetail(filtered[0], detailContainer);
            } else if (activeExists) {
                const activeEnemy = filtered.find(e => e.templateId === activeEnemyId);
                if (activeEnemy) {
                    const activeItem = container.querySelector(`.enemy-item[data-enemy-id="${activeEnemyId}"]`);
                    if (activeItem) activeItem.classList.add('active');
                    loadEnemyDetail(activeEnemy, detailContainer);
                }
            }
        }

        async function loadEnemyDetail(enemy, container) {
            container.innerHTML = '<div class="loader">加载敌人数据...</div>';
            try {
                const data = await fetch(enemy.contentFile + '?t=' + Date.now()).then(r => r.json());
                currentEnemyData = data;
                currentEnemy = enemy;

                // 初始化每个变种的展开状态为 false
                const variants = data.变种 || [];
                variantExpandStates = {};
                variants.forEach((_, idx) => { variantExpandStates[idx] = false; });

                container.innerHTML = renderDetail(data, enemy);

                // 绑定每个变种的展开按钮
                const toggleBtns = container.querySelectorAll('.toggle-enemy-levels-btn');
                toggleBtns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        const variantIdx = parseInt(btn.dataset.variant, 10);
                        if (isNaN(variantIdx)) return;

                        // 切换该变种的展开状态
                        variantExpandStates[variantIdx] = !variantExpandStates[variantIdx];

                        // 更新该变种的表格和按钮文字
                        updateVariantTable(variants[variantIdx], variantIdx);

                        // 更新按钮文字
                        btn.textContent = variantExpandStates[variantIdx] ? '收起多余等级' : '展开所有等级';
                    });
                });
            } catch (err) {
                container.innerHTML = `<div class="error-message">加载失败: ${err.message}</div>`;
            }
        }

        function updateVariantTable(variant, idx) {
            const container = document.querySelector(`.variant-item[data-variant-index="${idx}"] .variant-table-container`);
            if (!container) return;

            const arrayFields = [];
            for (let key in variant) {
                if (Array.isArray(variant[key]) && variant[key].length > 0) {
                    if (!['enemyId', 'templateId', 'attrModifiers'].includes(key)) {
                        arrayFields.push(key);
                    }
                }
            }
            if (arrayFields.length === 0) {
                container.innerHTML = '';
                return;
            }

            const rowCount = variant[arrayFields[0]].length;
            const headers = arrayFields.map(f => `<th>${f}</th>`).join('');

            let allRows = '';
            for (let i = 0; i < rowCount; i++) {
                const cells = arrayFields.map(f => {
                    let val = variant[f][i];
                    if (typeof val === 'number') val = val.toFixed(2);
                    return `<td>${val}</td>`;
                }).join('');
                allRows += `<tr data-level="${i+1}"><td>${i+1}</td>${cells}</tr>`;
            }

            // 使用该变种的独立展开状态
            const showAll = variantExpandStates[idx] || false;
            let rowsToRender = allRows;
            if (enemyLevelsToShow && !showAll) {
                const levelSet = new Set(enemyLevelsToShow);
                const rowArray = allRows.split('</tr>').filter(r => r.trim());
                const filteredRows = rowArray.filter(row => {
                    const match = row.match(/data-level="(\d+)"/);
                    return match && levelSet.has(parseInt(match[1], 10));
                });
                rowsToRender = filteredRows.join('</tr>') + (filteredRows.length ? '</tr>' : '');
            }
            if (!rowsToRender && enemyLevelsToShow && enemyLevelsToShow.length > 0) {
                const maxLevel = Math.max(...enemyLevelsToShow);
                const found = allRows.split('</tr>').find(r => r.includes(`data-level="${maxLevel}"`));
                rowsToRender = found ? found + '</tr>' : '';
            }

            const tableHtml = `
                <table class="variant-table">
                    <thead><tr><th>等级</th>${headers}</tr></thead>
                    <tbody>${rowsToRender}</tbody>
                </table>
            `;
            container.innerHTML = tableHtml;
        }

        function renderMeta(data) {
            const fields = [
                '处决承伤系数', '物理承伤系数', '自然承伤系数', '寒冷承伤系数', '电磁承伤系数', '灼热承伤系数', '超域承伤系数',
                '物理抗性系数', '自然抗性系数', '寒冷抗性系数', '电磁抗性系数', '灼热抗性系数', '超域抗性系数',
                '普通攻击范围', '失衡值上限', '失衡恢复时间', '失衡时护甲值', '失衡节点',
                '处决技力回复', '重量', '对塔攻击值', '初始护甲', '最大韧性', '回弹系数',
                '受伤韧性降低', '韧性完全回复时长', '韧性回复值', '韧性回复间隔', '韧性归零时护甲值'
            ];
            // 原有字段可能重复，我们重新定义完整列表，替换旧的fields数组。
            // 注意原来可能还有其他字段（如‘处决承伤系数’等已包含），我们可以直接替换。
            // 确保不显示undefined值。
            let html = '<div class="meta-grid">';
            fields.forEach(field => {
                if (data[field] !== undefined && data[field] !== '') {
                    html += `
                        <div class="meta-item">
                            <span class="meta-label">${field}</span>
                            <span class="meta-value">${data[field]}</span>
                        </div>
                    `;
                }
            });
            html += '</div>';
            return html;
        }

        function renderSkillDesc(skillArray) {
            if (!Array.isArray(skillArray) || skillArray.length === 0) return '';
            return `
                <div class="skill-desc-list">
                    ${skillArray.map(s => `<div class="skill-desc-item">${parseText(s)}</div>`).join('')}
                </div>
            `;
        }

        function renderVariants(variants) {
            if (!variants.length) return '<p>无变种数据</p>';
            return variants.map((variant, idx) => {
                const arrayFields = [];
                for (let key in variant) {
                    if (Array.isArray(variant[key]) && variant[key].length > 0) {
                        if (!['enemyId', 'templateId', 'attrModifiers'].includes(key)) {
                            arrayFields.push(key);
                        }
                    }
                }
                if (arrayFields.length === 0) return '';

                const rowCount = variant[arrayFields[0]].length;
                const headers = arrayFields.map(f => `<th>${f}</th>`).join('');

                let allRows = '';
                for (let i = 0; i < rowCount; i++) {
                    const cells = arrayFields.map(f => {
                        let val = variant[f][i];
                        if (typeof val === 'number') val = val.toFixed(2);
                        return `<td>${val}</td>`;
                    }).join('');
                    allRows += `<tr data-level="${i+1}"><td>${i+1}</td>${cells}</tr>`;
                }

                // 使用独立状态
                const showAll = variantExpandStates[idx] || false;
                let rowsToRender = allRows;
                if (enemyLevelsToShow && !showAll) {
                    const levelSet = new Set(enemyLevelsToShow);
                    const rowArray = allRows.split('</tr>').filter(r => r.trim());
                    const filteredRows = rowArray.filter(row => {
                        const match = row.match(/data-level="(\d+)"/);
                        return match && levelSet.has(parseInt(match[1], 10));
                    });
                    rowsToRender = filteredRows.join('</tr>') + (filteredRows.length ? '</tr>' : '');
                }
                if (!rowsToRender && enemyLevelsToShow && enemyLevelsToShow.length > 0) {
                    const maxLevel = Math.max(...enemyLevelsToShow);
                    const found = allRows.split('</tr>').find(r => r.includes(`data-level="${maxLevel}"`));
                    rowsToRender = found ? found + '</tr>' : '';
                }

                const variantId = variant.enemyId || `变种 ${idx+1}`;
                const modifier = variant.attrModifiers ? `<div class="variant-modifier">${variant.attrModifiers}</div>` : '';
                const toggleButton = enemyLevelsToShow ? `
                    <div style="text-align:right; margin-top:4px;">
                        <button class="toggle-enemy-levels-btn" data-variant="${idx}" style="background: var(--button-bg, #e0e8f0); border: 1px solid var(--border-color); border-radius: 16px; padding: 4px 12px; cursor: pointer;">${showAll ? '收起多余等级' : '展开所有等级'}</button>
                    </div>
                ` : '';

                return `
                    <div class="variant-item" data-variant-index="${idx}">
                        <div class="variant-title">${variantId}</div>
                        ${modifier}
                        <div class="variant-table-container">
                            <table class="variant-table">
                                <thead>
                                    <tr>
                                        <th>等级</th>
                                        ${headers}
                                    </tr>
                                </thead>
                                <tbody>
                                    ${rowsToRender}
                                </tbody>
                            </table>
                        </div>
                        ${toggleButton}
                    </div>
                `;
            }).join('');
        }

        function renderDetail(data, enemy) {
            const rarity = data.rarity || enemy.rarity || 1;
            const basicHtml = `
                <div class="detail-header">
                    <div class="detail-left">
                        <div class="detail-icon">
                            <img src="${data.icon || ''}" onerror="this.onerror=null; this.src='';">
                        </div>
                        <div class="detail-text">
                            <div class="detail-title-row">
                                <span class="detail-name">${data.name}</span>
                                <span class="detail-rarity rarity-${rarity}" title="稀有度 ${rarity}"></span>
                                <span class="detail-id">${enemy.templateId}</span>
                            </div>
                            <div class="detail-tags">
                                ${data.enemyTag ? `<span class="tag">${data.enemyTag}</span>` : ''}
                            </div>
                            <div class="detail-meta">
                                ${renderMeta(data)}
                            </div>
                            ${data.描述 ? `<div class="detail-desc">${parseText(data.描述)}</div>` : ''}
                            ${data.技能描述 ? renderSkillDesc(data.技能描述) : ''}
                        </div>
                    </div>
                    <div class="detail-pic">
                        <img src="${data.iconbig || data.icon || ''}" onerror="this.onerror=null; this.src='';">
                    </div>
                </div>
            `;
            const variantsHtml = renderVariants(data.变种 || []);
            return `
                ${basicHtml}
                <div class="section">
                    <h3>变种属性</h3>
                    ${variantsHtml}
                </div>
            `;
        }

        const mobileBtn = document.getElementById('enemyMobileListBtn');
        const mobileOverlay = document.getElementById('enemyMobileListOverlay');
        const mobileContent = document.getElementById('enemyMobileListContent');

        function buildMobileList() {
            const filtered = filterEnemiesBySearch(allEnemies);
            mobileContent.innerHTML = '';
            filtered.forEach(enemy => {
                const item = document.createElement('div');
                item.className = 'mobile-list-item';
                if (enemy.templateId === activeEnemyId) item.classList.add('active');
                item.innerHTML = `
                    <div class="item-name">${enemy.name}</div>
                    <div class="item-id">${enemy.templateId}</div>
                `;
                item.addEventListener('click', () => {
                    activeEnemyId = enemy.templateId;
                    loadEnemyDetail(enemy, document.getElementById('enemyDetail'));
                    closeMobileList();
                });
                mobileContent.appendChild(item);
            });
        }

        function openMobileList() {
            buildMobileList();
            mobileOverlay.style.display = 'flex';
        }

        function closeMobileList() {
            mobileOverlay.style.display = 'none';
        }

        async function refreshModule() {
            const list = document.getElementById('enemyList');
            const detail = document.getElementById('enemyDetail');
            if (!list || !detail) return;
            const showHidden = getCurrentShowHidden();
            const enemies = await loadEnemyManifest(showHidden);
            allEnemies = enemies;
            renderEnemyList();
        }

        async function initModule() {
            if (isInitialized) return;
            isInitialized = true;
            if (window.configLoaded) await window.configLoaded;
            const settings = window.akeData?.getLevelSettings?.() || {};
            if (settings.enabled) {
                enemyLevelsToShow = parseLevelInput(settings.enemyLevels, 100);
            }
            if (mobileBtn) mobileBtn.addEventListener('click', openMobileList);
            if (mobileOverlay) mobileOverlay.addEventListener('click', (e) => {
                if (e.target === mobileOverlay) closeMobileList();
            });
            window.addEventListener('globalConfigChanged', (e) => {
                searchTerm = '';
                const searchInput = document.getElementById('enemySearchInput');
                if (searchInput) searchInput.value = '';
                const settings = window.akeData?.getLevelSettings?.() || {};
                if (settings.enabled) {
                    enemyLevelsToShow = parseLevelInput(settings.enemyLevels, 100);
                } else {
                    enemyLevelsToShow = null;
                }
                // 重置展开状态（因为重新加载了列表）
                variantExpandStates = {};
                refreshModule();
            });

            document.getElementById('enemySearchInput')?.addEventListener('input', (e) => {
                searchTerm = e.target.value;
                renderEnemyList();
            });

            await refreshModule();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initModule);
        } else {
            initModule();
        }
    })();
</script>
